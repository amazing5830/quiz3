name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Cordova
        run: npm install -g cordova@12

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: cordova platform add android@12

      - name: Build APK
        run: cordova build android --release -- --packageType=apk

      - name: Sign APK (debug key for testing)
        run: |
          cd platforms/android/app/build/outputs/apk/release/
          # 生成临时签名密钥（仅用于测试安装）
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Debug,OU=Debug,O=Debug,L=Debug,ST=Debug,C=US"
          # 对齐
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | tail -1)/zipalign -v -p 4 app-release-unsigned.apk app-release-aligned.apk
          # 签名
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | tail -1)/apksigner sign --ks debug.keystore --ks-pass pass:android --key-pass pass:android --ks-key-alias androiddebugkey --out SafetyQuiz.apk app-release-aligned.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SafetyQuiz-APK
          path: platforms/android/app/build/outputs/apk/release/SafetyQuiz.apk
          if-no-files-found: error
