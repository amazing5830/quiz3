<!DOCTYPE html>

<head>

<title>电力安全答题小程序</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:#f5f5f5;color:#333;max-width:750px;margin:0 auto;min-height:100vh}
.hidden{display:none!important}
.header{background:#07C160;color:#fff;padding:15px;text-align:center;font-size:18px;font-weight:bold;position:sticky;top:0;z-index:100}
.header span.back-btn{cursor:pointer;position:absolute;left:15px;font-size:14px}
.page{padding:20px 15px;min-height:calc(100vh - 50px)}
.btn{display:block;width:100%;padding:15px 20px;margin-bottom:15px;background:#fff;border-radius:10px;text-align:center;font-size:16px;color:#333;cursor:pointer;border:none;box-shadow:0 2px 8px rgba(0,0,0,0.08);transition:all .2s}
.btn:active{transform:scale(.98);background:#f0f0f0}
.btn-primary{background:#07C160;color:#fff}
.btn-primary:active{background:#06a050}
.btn-danger{background:#f56c6c;color:#fff}
.btn-warning{background:#e6a23c;color:#fff}
.card{background:#fff;border-radius:10px;padding:20px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.card-title{font-size:14px;color:#07C160;margin-bottom:10px}
.card-desc{font-size:13px;color:#999;line-height:1.6}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:15px}
.stat-item{background:#fff;border-radius:10px;padding:15px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.stat-num{font-size:24px;font-weight:bold;color:#07C160}
.stat-label{font-size:12px;color:#999;margin-top:5px}
.progress-bar{height:6px;background:#e0e0e0;border-radius:3px;overflow:hidden;margin:10px 0}
.progress-fill{height:100%;background:#07C160;transition:width .3s}
.question-meta{font-size:13px;color:#999;margin-bottom:10px}
.question-text{font-size:16px;line-height:1.7;margin-bottom:15px;word-wrap:break-word}
.option-item{padding:12px 15px;background:#f8f8f8;border-radius:8px;margin-bottom:10px;cursor:pointer;border:2px solid transparent;transition:all .2s}
.option-item:active{background:#e8e8e8}
.option-item.selected{background:#e6f7ed;border-color:#07C160}
.option-item.correct{background:#e6f7ed;border-color:#07C160}
.option-item.wrong{background:#fef0f0;border-color:#f56c6c}
.option-item.disabled{cursor:not-allowed;opacity:.7}
.option-label{display:inline-block;width:26px;height:26px;line-height:26px;text-align:center;background:#07C160;color:#fff;border-radius:50%;margin-right:10px;font-size:14px}
.option-text{font-size:15px;line-height:1.6}
.answer-feedback{margin-top:15px;padding:12px;border-radius:8px;font-size:14px}
.answer-correct{background:#e6f7ed;color:#07C160}
.answer-wrong{background:#fef0f0;color:#f56c6c}
.action-row{display:flex;gap:10px;margin-top:15px}
.action-row .btn{flex:1;margin-bottom:0}
.question-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
.question-nav .info{font-size:13px;color:#999}
.nav-btn{padding:8px 20px;background:#07C160;color:#fff;border:none;border-radius:20px;font-size:14px;cursor:pointer}
.nav-btn:disabled{background:#ccc;cursor:not-allowed}
.type-tabs{display:flex;gap:8px;margin-bottom:15px;flex-wrap:wrap}
.type-tab{padding:8px 16px;background:#f0f0f0;border-radius:20px;font-size:14px;cursor:pointer;border:none;transition:all .2s}
.type-tab.active{background:#07C160;color:#fff}
.timer{position:sticky;top:50px;z-index:90;text-align:center;padding:10px;background:#fff;border-radius:0 0 10px 10px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.timer-time{font-size:22px;font-weight:bold;color:#07C160}
.timer-label{font-size:11px;color:#999}
.exam-section{margin-bottom:20px}
.exam-section-title{font-size:14px;color:#07C160;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #eee}
.exam-nav{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:10px}
.exam-nav-item{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:#f0f0f0;border-radius:6px;font-size:12px;cursor:pointer;border:none;transition:all .2s}
.exam-nav-item.answered{background:#07C160;color:#fff}
.exam-nav-item.current{background:#e6a23c;color:#fff;transform:scale(1.1)}
.exam-nav-item.wrong-answer{background:#f56c6c;color:#fff}
.result-card{background:#fff;border-radius:10px;padding:25px;text-align:center;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.result-score{font-size:48px;font-weight:bold;color:#07C160;margin:15px 0}
.result-desc{font-size:14px;color:#999}
.result-detail{margin-top:20px;text-align:left}
.result-item{padding:10px 0;border-bottom:1px solid #f0f0f0;font-size:14px}
.wrong-card{background:#fff;border-radius:10px;padding:15px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.wrong-num{color:#f56c6c;font-size:12px;margin-bottom:5px}
.wrong-q{font-size:15px;line-height:1.6}
.wrong-answer{color:#f56c6c;font-size:13px;margin-top:8px}
.wrong-correct{color:#07C160;font-size:13px;margin-top:5px}
.confirm-btn{width:100%;padding:12px;background:#07C160;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;margin-top:10px}
.confirm-btn:disabled{background:#ccc;cursor:not-allowed}
.multi-hint{font-size:12px;color:#e6a23c;margin-bottom:10px}
.judge-btns{display:flex;gap:15px;margin-top:15px}
.judge-btn{flex:1;padding:15px;background:#f8f8f8;border:2px solid transparent;border-radius:10px;text-align:center;font-size:16px;cursor:pointer;transition:all .2s}
.judge-btn:active{background:#e8e8e8}
.judge-btn.selected{background:#e6f7ed;border-color:#07C160}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:15px}
.modal-content{background:#fff;border-radius:12px;padding:25px;width:100%;max-width:350px;text-align:center}
.modal-title{font-size:18px;font-weight:bold;margin-bottom:15px}
.modal-text{font-size:14px;color:#666;line-height:1.6;margin-bottom:20px}
.modal-btns{display:flex;gap:10px}
.modal-btns .btn{flex:1}
.empty-state{text-align:center;padding:50px 20px;color:#999}
.empty-state .icon{font-size:50px;margin-bottom:15px}
</style>
</head>

<script>
const allQuestions = {"单选题":[{"id":1,"question":"1kV 及以下的交流电压等级，（  ）及以下的直流电压等级属于低[电]压","options":{"A":"1kV","B":"1.5kV","C":"2kV","D":"2.5kV"},"answer":"B","explanation":""},{"id":2,"question":"在电力系统内用于输配电的杆塔、（  ）、绝缘材料和附件组成的设施。包括高压输电线路和高压配电线路、低压配电线路。","options":{"A":"导线","B":"金具","C":"断路器","D":"隔离开关"},"answer":"A","explanation":""},{"id":3,"question":"一个电气连接部分是指可用（   ）与其他电气装置分开的部分。","options":{"A":"断路器","B":"隔离开关","C":"接地开关","D":"熔断器"},"answer":"B","explanation":""},{"id":4,"question":"高压线路是指（  ）以上的电力线路。可分为高压输电线路和高压配电线路。","options":{"A":"1kV","B":"2kV","C":"3kV","D":"4kV"},"answer":"A","explanation":""},{"id":5,"question":"断路器是指能关合、承载、开断正常回路条件下的电流；在规定的时间内承载规定的过电流,并能关合和开断在异常回路条件(例如各种短路条件)下的电流的机械开关装置。也称（  ）。","options":{"A":"刀闸","B":"开关","C":"令克","D":"地刀"},"answer":"B","explanation":""},{"id":6,"question":"隔离开关是指在分位置时,触头间有符合规定要求的绝缘距离和明显的断开标志；在合位置时,能承载（  ）的电流及在规定时间内异常条件(例如短路)下的电流的开关设备。","options":{"A":"正常回路条件下","B":"短路","C":"负荷较轻","D":"接地"},"answer":"A","explanation":""},{"id":7,"question":"个人保安线用于保护（  ）。","options":{"A":"个人的接地线","B":"线路接地线","C":"工作人员防止感应电伤害的接地线","D":"个人安全带"},"answer":"C","explanation":""},{"id":8,"question":"（   ）为电网发电、输电、变电、配电、调度等生产作业安全有序实施而设计的一种组织性书面形式控制依据。","options":{"A":"作业指导书","B":"抢修单","C":"操作票","D":"工作票"},"answer":"D","explanation":""},{"id":9,"question":"外单位人员办理工作票时，工作票经（    ）签发后，由设备运维单位审核并签发（即会签）的过程。","options":{"A":"运维班组","B":"工作负责人所在单位","C":"项目部门","D":"基建部门"},"answer":"B","explanation":""},{"id":10,"question":"高处作业是指凡在坠落高度基准面（  ）及以上，有可能坠落的高处进行的作业。","options":{"A":"2.5m","B":"1.5m","C":"2m","D":"1m"},"answer":"C","explanation":""},{"id":11,"question":"有限空间指封闭或部分封闭、进出口受限但人员可以进入、未被设计为固定工作场所，通风不良，易造成有毒有害、易燃易爆物质积聚或（  ）的空间。","options":{"A":"拥挤","B":"高度不足","C":"氧含量不足","D":"光照不足"},"answer":"C","explanation":""},{"id":12,"question":"作业人员有权依据本规程拒绝违章指挥和强令冒险作业，在发现危及（   ）安全的情况时，有权停止作业或采取可行的应急措施后撤离作业场所，并立即报告。","options":{"A":"电网","B":"人身","C":"设备","D":"设施"},"answer":"B","explanation":""},{"id":13,"question":"经县级或二级甲等及以上医疗机构鉴定，无妨碍工作的病症，至少每两年进行一次体检，高处作业人员应(  )进行一次体检。","options":{"A":"每年","B":"每半年","C":"两年","D":"一年半"},"answer":"A","explanation":""},{"id":14,"question":"作业人员应接受相应的安全生产教育和岗位技能培训，（  ）上岗。","options":{"A":" 直接","B":"经考试合格","C":"经考试后","D":"经领导批准后"},"answer":"B","explanation":""},{"id":15,"question":"（  ）在作业前应被告知其作业任务和作业现场存在的危险因素、防范措施及应急措施。","options":{"A":"监护人","B":"工作许可人","C":"工作负责人","D":"作业人员"},"answer":"D","explanation":""},{"id":16,"question":"特种作业人员及特种设备作业人员应按照国家有关规定经专门的安全作业培训，并经相关管理机构考核合格，取得相应的特种作业操作证、（     ），方可从事相应工作。","options":{"A":"特种作业操作资格证书","B":"培训合格证书","C":"特种设备作业人员证","D":"特种作业操作证书"},"answer":"C","explanation":""},{"id":17,"question":"起飞全重（ ）以上及超视距飞行的无人机操控员应取得国家民用航空主管部门颁发或授权的无人机资质证照。","options":{"A":"7kg","B":"8kg","C":"9kg","D":"10kg"},"answer":"A","explanation":""},{"id":18,"question":"室内母线分段部分、母线交叉部分及部分停电检修易误碰带电设备的，应设有明显标志的（   ）。","options":{"A":"标志牌","B":"隔离挡板（护网）","C":" 警示牌","D":" 遮拦"},"answer":"B","explanation":""},{"id":19,"question":"凡装有攀登装置的杆塔、变压器、融冰装置等，攀登装置上应设置（    ）标志牌。","options":{"A":"\"禁止攀登，高压危险！\"","B":"\"止步，高压危险！\"","C":"\"禁止合闸，有人工作！\"","D":"\"在此工作！\""},"answer":"A","explanation":""},{"id":20,"question":"高压设备接地故障时，室内不应接近故障点（  ）以内，室外不应接近故障点 8m 以内。进入上述范围的人员应穿绝缘靴，接触设备的外壳和构架应戴绝缘手套。","options":{"A":" 4m","B":" 6m","C":"8m","D":"5m"},"answer":"A","explanation":""},{"id":21,"question":"在厂站、配电房、配电开关站的带电区域内或邻近带电导体附近，不应使用金属梯子；搬动梯子、管子等长物应将其放倒后，宜由（  ）搬运，并与带电部分保持足够的安全距离。","options":{"A":"一人","B":"两人","C":"三人","D":"四人"},"answer":"B","explanation":""},{"id":22,"question":"电气设备着火时，应(  )，然后进行灭火。","options":{"A":"逃离","B":"搬运物品","C":"用水灭火","D":"立即切断有关电源"},"answer":"D","explanation":""},{"id":23,"question":"进入SF6配电装置室，应先（  ）。","options":{"A":"消毒","B":"带口罩","C":"通风","D":"穿防护服"},"answer":"C","explanation":""},{"id":24,"question":"检修动力电源箱的支路（电焊专用支路除外）开关均应加装（）（也称漏电保护器），应定期和使用前进行检查和试验。","options":{"A":"剩余电流动作保护器","B":"开关","C":"刀闸","D":"保护器"},"answer":"A","explanation":""},{"id":25,"question":"　临时用电检修电源箱应装自动空气开关、（）、接线柱或插座；专用接地铜排和端子、箱体应可靠接地，接地、接零标识应清晰。","options":{"A":"剩余电流动作保护器","B":"开关","C":"刀闸","D":"保护器"},"answer":"A","explanation":""},{"id":26,"question":"施工用电设施应由（    ）安装维护，不应私拉乱接。","options":{"A":"工作负责人","B":"安全员","C":"取得资质的人员","D":"施工人员"},"answer":"C","explanation":""},{"id":27,"question":"敷设临时低压电源线路，应使用绝缘导线。架空高度室内应大于 2.5m，室外应大于 4m，跨越道路应大于（   ）。","options":{"A":"8m","B":"7m","C":"6m","D":"5m"},"answer":"C","explanation":""},{"id":28,"question":"灾后抢修应合理安排（   ）和资源，确保抢修作业人员的人身安全。","options":{"A":"工期","B":"进度","C":"物资","D":"监护"},"answer":"A","explanation":""},{"id":29,"question":"在抢修过程中无法保证人身安全的，应当从危险区域内撤出作业人员，疏散可能危及的其他人员，设置（     ）。","options":{"A":"安全围栏","B":"警戒标识","C":"临时围栏","D":"警示带"},"answer":"B","explanation":""},{"id":30,"question":"灾后抢修应办理紧急抢修工作票或相应的工作票，作业前应确认设备状态符合抢修（    ）要求。","options":{"A":"安全措施","B":"组织措施","C":"技术措施","D":"管理协议"},"answer":"A","explanation":""},{"id":31,"question":"本单位工作票签发人或工作负责人认为有必要时，应组织现场勘察。（   ）或项目管理单位在外单位办理工作票前，应开展安全技术交底；当存在应开展现场勘察的作业情形或认为有必要时，应先组织现场勘察再进行安全技术交底。","options":{"A":"设备运维单位","B":"设备管理部","C":"安全监察部","D":"系统运行部"},"answer":"A","explanation":""},{"id":32,"question":"紧急抢修工作前，应进行现场勘察及安全技术交底，可不填写现场勘察及安全技术交底记录，但应在相应（  ）备注栏中注明勘察人员及完成时间。","options":{"A":"作业表单","B":"作业记录","C":"操作票","D":"工作票"},"answer":"D","explanation":""},{"id":33,"question":"作业单位依据勘察情况，对危险性、复杂性和困难程度较大的作业项目，应制订有针对性的专项（  ）。","options":{"A":"应急预案","B":"工作方案","C":"作业指导书","D":"工作规程"},"answer":"B","explanation":""},{"id":34,"question":"工作负责人不应兼任该项工作的工作票签发人（会签人）、（    ）及工作班人员，工作票所列其他人员可相互兼任。","options":{"A":"工作许可人","B":"工作票会签人","C":"工作负责人","D":"工作班成员"},"answer":"A","explanation":""},{"id":35,"question":"（    ）、工作许可人应具有相应且足够的工作经验，熟悉工作范围及相关设备的情况。","options":{"A":"工作负责人（监护人）","B":"工作许可人","C":"工作票会签人","D":"工作票签发人"},"answer":"A","explanation":""},{"id":36,"question":"（  ）应具有相应且足够的工作经验，能及时发现作业人员身体和精神状况的异常。","options":{"A":"工作票会签人","B":"专责监护人","C":"工作票签发人","D":"工作许可人"},"answer":"B","explanation":""},{"id":37,"question":"工作票签发人、工作负责人和工作许可人（简称\"承包商\"）（   ）应进行\"承包商\"资格考试，合格后正式公布。调度许可人可不参加\"承包商\"资格考试，但应以调度员资格形式正式公布，并送达相关单位。","options":{"A":"每季度","B":"每半年","C":"每年","D":"每两年"},"answer":"C","explanation":""},{"id":38,"question":"需要高压配电设备、高压配电线路全部停电或部分停电的工作需选用（  ）工作票。","options":{"A":"配电第一种","B":"配电第二种","C":"配电第三种","D":"紧急抢修"},"answer":"A","explanation":""},{"id":39,"question":"工作票填写：填写工作班人员，不分组时应填写除（   ）以外的所有工作人员姓名。","options":{"A":"厂站工作许可人","B":"工作负责人","C":"工作票签发人","D":"调度许可人"},"answer":"B","explanation":""},{"id":40,"question":"同一工作人员在同一段时间内被列为多张工作票的工作人员时，应经各（     ）同意，并在每张工作票的备注栏注明人员变动情况。","options":{"A":"工作票签发人","B":"工作负责人","C":"工作许可人","D":"工作票会签人"},"answer":"B","explanation":""},{"id":41,"question":"工作票总人数包括（  ）及工作班所有人员。","options":{"A":"工作票签发人","B":"工作许可人","C":"工作负责人","D":"监护人"},"answer":"C","explanation":""},{"id":42,"question":"（  ）、书面布置记录票不必签发。","options":{"A":"第三种工作票","B":"第二种工作票","C":"紧急抢修工作票","D":"第一种工作票"},"answer":"C","explanation":""},{"id":43,"question":"（     ）许可前应核对工作负责人身份与工作票填写的工作负责人身份是否相符。","options":{"A":"值班负责人","B":"值班人员","C":"工作许可人","D":"值班调度员"},"answer":"C","explanation":""},{"id":44,"question":"若线路停电作业还涉及其他单位配合停电的线路，（   ）应与工作许可人确认配合停电线路已停电并做好相应安全措施后，方可开展工作。","options":{"A":"工作负责人","B":"值班负责人","C":"工作许可人","D":"值班人员"},"answer":"A","explanation":""},{"id":45,"question":"工作许可手续签名前，工作许可人应对（ ）就工作票所列安全措施实施情况、带电部位和注意事项进行安全交代。","options":{"A":"工作班成员","B":"工作票签发人","C":"安全员","D":"工作负责人"},"answer":"D","explanation":""},{"id":46,"question":"一个工作负责人不应同时执行（  ）及以上工作票。","options":{"A":"两张","B":"三张","C":"四张","D":"五张"},"answer":"A","explanation":""},{"id":47,"question":"（　　）临时离开时，应通知被监护人员停止工作或撤离工作现场，待专责监护人回来后方可恢复工作。","options":{"A":"专责监护人","B":"安全员","C":"工作负责人","D":"工作人员"},"answer":"A","explanation":""},{"id":48,"question":"设备停电作业时，（　　）在确保监护工作不受影响，且班组人员确无触电等危险的条件下，可以参加工作班工作。","options":{"A":"工作负责人","B":"专责监护人","C":"安全员","D":"值班负责人"},"answer":"A","explanation":""},{"id":49,"question":"作业人员离开工作现场，工作票所列安全措施不变，宜办理工作（  ），但每次复工前应检查安全措施正确完好。","options":{"A":"间断","B":"终结","C":"延期","D":"改期"},"answer":"A","explanation":""},{"id":50,"question":"（    ）不应擅自变更工作票中自行装设的接地线（接地刀闸）位置。如需变更，工作负责人应征得工作票签发人或工作许可人同意，对装设在厂站内的，还应征得厂站值班人员同意，变更情况应在工作票上注明。","options":{"A":"值班人员","B":"工作许可人","C":"工作负责人","D":"工作班人员"},"answer":"D","explanation":""},{"id":51,"question":"（    ）如需变更工作负责人应重新办理工作票。","options":{"A":"配电第一种工作票","B":"紧急抢修工作票","C":"配电第二种工作票","D":"带电作业工作票"},"answer":"B","explanation":""},{"id":52,"question":"配电第一种工作票应在工作批准期限前（   ）（特殊情况除外），由工作负责人向工作许可人申请办理延期手续。","options":{"A":"1h","B":"4h","C":"0.5h","D":"2h"},"answer":"D","explanation":""},{"id":53,"question":"全部作业结束，作业人员撤离现场后、办理作业终结前，（  ）未经工作负责人许可，不应进入工作现场。","options":{"A":"作业人员","B":"任何人员","C":"工作人员","D":"检修人员"},"answer":"B","explanation":""},{"id":54,"question":"在停电的电气设备上接地（装设接地线或合接地刀闸）前，应（），验明电气设备确无电压。验电过程应有人监护，高压验电时应戴绝缘手套。","options":{"A":"先停电","B":"先验电","C":"先装设围栏","D":"先得到调度许可"},"answer":"B","explanation":""},{"id":55,"question":"验电前，应（）后，立即在停电设备上实施验电。无法在带电设备上进行试验时，可用工频高压发生器等确证验电器良好。","options":{"A":"在更高电压等级的带电设备上确证验电器良好","B":"在更低电压等级的带电设备上确证验电器良好","C":"检查外观良好","D":"在相应电压的带电设备上确证验电器良好"},"answer":"D","explanation":""},{"id":56,"question":"直接验电时，应使用相应电压等级的验电器在设备的（）处逐相验电。","options":{"A":"接地处线路侧","B":"预接地","C":"开关线路侧","D":"开关两端"},"answer":"B","explanation":""},{"id":57,"question":"验电器的伸缩式绝缘棒长度应拉足，保证绝缘棒的有效绝缘长度符合表5的规定，验电时手应握在手柄处，()。","options":{"A":"不应超过护环","B":"手保持与带电部位0.7米安全距离","C":"手保持与带电部位1米安全距离","D":"保持稳定"},"answer":"A","explanation":""},{"id":58,"question":"（）不应使用常规验电器进行室外直接验电，可采用雨雪型验电器验电。","options":{"A":"雨雪天气时","B":"大雨天气时","C":"大雾天气时","D":"寒冷天气时"},"answer":"A","explanation":""},{"id":59,"question":"间接验电时，应有（  ）及以上非同样原理或非同源的指示且均已同时发生对应变化，才能确认该设备已无电；但如果任一指示有电，则不应在该设备上工作。","options":{"A":"一个","B":"两个","C":"三个","D":"四个"},"answer":"B","explanation":""},{"id":60,"question":"线路中检修联络用的断路器、隔离开关或其组合时，应在其（）验电。","options":{"A":"负荷侧","B":"两侧分别","C":"电源侧","D":"大号侧"},"answer":"B","explanation":""},{"id":61,"question":"高压配电网接地时，接地线应采用（）接地线。低压配电网接地时，接地线应采用相线与零线短路式接地线。","options":{"A":"两相短路式","B":"三相短路式","C":"10kV","D":"多股软铜线"},"answer":"B","explanation":""},{"id":62,"question":"验明高压设备或线路确无电压后，应立即将检修设备（）。电缆及电容器接地前应逐相充分放电。","options":{"A":"转冷备用状态","B":"接地并三相短路","C":"隔离","D":"短路"},"answer":"B","explanation":""},{"id":63,"question":"检修线路、设备各方面可能来电的电源已完全断开后，应（）。","options":{"A":"合上（装设）接地刀闸（接地线）","B":"拉开隔离开关","C":"拉开线路跌落式熔断器","D":"装设围栏"},"answer":"A","explanation":""},{"id":64,"question":"配合停电的线路，可只在工作地点附近装设（）接地线。","options":{"A":"一处","B":"二处","C":"三处","D":"封闭"},"answer":"A","explanation":""},{"id":65,"question":"工作地段有邻近、平行、交叉跨越及同杆塔线路，需要接触或接近停电线路的导线工作时，应（）。","options":{"A":"停电","B":"保持安全距离","C":"装设接地线","D":"装设围栏"},"answer":"C","explanation":""},{"id":66,"question":"对于因交叉跨越、平行或邻近带电线路、设备导致检修设备或线路可能产生感应电压时，应（），加装（拆除）的接地线应记录在工作票上，个人保安线由作业人员自行装拆。","options":{"A":"使用个人保安线","B":"加装接地线或使用个人保安线","C":"将交叉跨越线路停电","D":"加装接地线"},"answer":"B","explanation":""},{"id":67,"question":"装设接地线、个人保安线时，应（      ），拆除的顺序与此相反。","options":{"A":"接地端、导体(线）端同时装","B":"先装接导体(线）端，后装接地端","C":"先装接地端，后装导体（线）端","D":"只装接地端"},"answer":"C","explanation":""},{"id":68,"question":"装拆接地线导体端应使用绝缘棒并戴（），人体不应碰触接地线、未接地的导线和设备裸露部分。装拆接地线应有人监护。","options":{"A":"护目镜","B":"安全带","C":"防护服","D":"绝缘手套"},"answer":"D","explanation":""},{"id":69,"question":"接地线或个人保安线应接触良好、连接可靠。不应采用缠绕的方法进行接地或短路。接地线应使用（）固定在导体上。带接地线拆设备接头时，应采取防止接地线脱落的措施。","options":{"A":"专用的线夹","B":"螺栓","C":"弹簧压紧","D":"线鼻子"},"answer":"A","explanation":""},{"id":70,"question":"作业现场装设的工作接地线应列入工作票，工作负责人应确认()后，方可开工。使用分组工作派工单分组工作时，分组负责的工作接地线已装设完成，经工作负责人核实满足工作条件并同意后，该分组方可开始工作。","options":{"A":"所有工作接地线均已装设完成","B":"系统接地线均已装设完成","C":"部分工作接地线均已装设完成","D":"已停电"},"answer":"A","explanation":""},{"id":71,"question":"成套接地线应由有透明护套的多股软铜线和专用线夹组成。接地线截面积不应小于（），并应满足装设地点短路电流的要求。","options":{"A":"10mm2","B":"16mm2","C":"25mm2","D":"35mm2"},"answer":"C","explanation":""},{"id":72,"question":"高压设备停电检修工作，作业人员应在（）的保护范围内作业。不应在无接地或接地不齐全的情况下进行停电检修作业。","options":{"A":"接地刀闸（接地线）","B":"开关","C":"工作负责人","D":"监护人"},"answer":"A","explanation":""},{"id":73,"question":"接地线的装设部位应是与（    ）、设备电气直接相连去除油漆或绝缘层的导电部分。绝缘导线的接地线应装设在验电接地环上或裸露的导电部分。","options":{"A":"运行线路","B":"检修线路","C":"热备用线路","D":"冷备用线路"},"answer":"B","explanation":""},{"id":74,"question":"无接地引下线的杆塔，可采用临时接地体。临时接地体的截面积不应小于（   ）（如φ16m 失去（  ）的保护，作业过程中应随时检查安全带是否拴牢。","options":{"A":"护目镜","B":"安全带","C":"工作鞋","D":"工作服"},"answer":"B","explanation":""},{"id":86,"question":"在没有栏杆的脚手架上工作，高度超过（  ）时，应使用安全带，或采取其他可靠的安全措施。","options":{"A":"1.5m","B":"2.0m","C":"2.5m","D":"3.5m"},"answer":"A","explanation":""},{"id":87,"question":" 线路杆塔宜设置作业人员上下杆塔和杆塔上水平移动的（  ）。","options":{"A":"围栏","B":"横担","C":"防坠落安全保护装置","D":"安全带"},"answer":"C","explanation":""},{"id":88,"question":"硬质梯子的横档应嵌在支柱上，梯阶的距离不应大于40cm，并在距梯顶(  )处设限高标志。","options":{"A":" 0.5m ","B":" 1m ","C":"1.5m ","D":" 2m "},"answer":"B","explanation":""},{"id":89,"question":"带电设备和线路附近使用的作业机具应(  )。","options":{"A":"短路","B":"短接","C":"接地","D":"并联"},"answer":"C","explanation":""},{"id":90,"question":"绝缘架空地线应视为带电体。在绝缘架空地线附近作业时，工作人员与绝缘架空地线之间的距离应不小于（   ）m。","options":{"A":"0.2","B":"0.4","C":"0.6","D":"0.8"},"answer":"B","explanation":""},{"id":91,"question":"风力大于（  ）级（风速大于10.7m/s）时应停止在带电线路杆塔上的作业。","options":{"A":"4","B":"5","C":"6","D":"7"},"answer":"B","explanation":""},{"id":92,"question":"在10kV及以下的带电杆塔上进行工作，工作人员距最下层高压带电导线垂直距离不应小于（   ）m。","options":{"A":"0.5","B":"0.7","C":"1","D":"1.5"},"answer":"B","explanation":""},{"id":93,"question":"经核对停电检修线路的线路名称、杆号及位置无误，验明线路确已（  ）后，方可开始工作。","options":{"A":"停电","B":"停电并装设接地线","C":"无电","D":"装设保安地线"},"answer":"B","explanation":""},{"id":94,"question":"进入有限空间前应严格遵守\"（  ）\"的原则，作业过程中还应做到\"实时监测、持续通风\"，确保空气质量符合作业安全要求。","options":{"A":"先通风、再检测、后作业","B":"先检测、再通风、后作业","C":"先作业、再检测、后通风","D":"先检测、再作业、后通风"},"answer":"A","explanation":""},{"id":95,"question":"有限空间的温度超过（   ）℃时，不应进行作业。","options":{"A":"50","B":"60","C":"65","D":"70"},"answer":"A","explanation":""},{"id":96,"question":"有限空间作业场所的灯具应具备防潮、防爆功能。移动照明应使用（  ）V以下的安全电压，潮湿环境下应使用不超过12V的安全电压。","options":{"A":"12","B":"24","C":"36","D":"48"},"answer":"C","explanation":""},{"id":97,"question":"作业时，有限空间外应设置（  ），其中在可能产生有害气体容器内进行工作的，应设定 2人在外面监护。","options":{"A":"看护人","B":"监护人","C":"工作负责人","D":"许可人"},"answer":"B","explanation":""},{"id":98,"question":"在沟道、井下等有限空间作业时，应在周围设置和安全警示标志。如人员撤离，沟道、井坑、孔洞的 r":"C","explanation":""},{"id":111,"question":"架空绝缘导线（   ）视为绝缘设备，不应直接接触或接近，不应穿越未停电接地的绝缘导线进行工作。","options":{"A":"可以","B":"必须","C":"不应","D":"应"},"answer":"C","explanation":""},{"id":112,"question":"挖坑时，应及时清除坑口附近浮土、石块，坑边不应有他人逗留。在超过（    ）m深的基坑内作业时，向坑外抛掷土石应防止土石回落坑内。","options":{"A":"0.8","B":"1","C":"1.5","D":"2"},"answer":"C","explanation":""},{"id":113,"question":"登杆塔作业前，应核对线路名称和（  ）是否正确。","options":{"A":"地理位置","B":"工器具","C":"工作地点杆塔号","D":"图纸"},"answer":"C","explanation":""},{"id":114,"question":"登杆塔前，应检查（ ）、设施，如脚扣、登高板、安全带、梯子等是否完整牢靠。","options":{"A":"安全工器具","B":"手工用具","C":"登高工具","D":"生产用具"},"answer":"C","explanation":""},{"id":115,"question":"立、撤杆塔过程中，基坑内不应有人工作。除指挥人及指定人员外，其他人员应在远离杆下（  ）倍杆高的距离以外。","options":{"A":"1","B":"1.2","C":"1.5","D":"2"},"answer":"B","explanation":""},{"id":116,"question":"顶杆及叉杆只能用于竖立（  ）m以下的拔梢杆，不应用铁锹、桩柱等代用顶杆及叉杆。","options":{"A":"5","B":"6","C":"7","D":"8"},"answer":"D","explanation":""},{"id":117,"question":"在撤杆工作中，拆除杆上导线前，应先检查（  ），做好防止倒杆、断杆措施，在挖坑前应先绑好拉绳。","options":{"A":"撤杆设备","B":"金具","C":"导线","D":"杆根、杆身"},"answer":"D","explanation":""},{"id":118,"question":"放线、紧线与撤线工作均应（  ）、统一信号，并做到通信畅通，做好监护。","options":{"A":"统一调度","B":"专人指挥","C":"统一指挥","D":"专人调度"},"answer":"B","explanation":""},{"id":119,"question":"（  ）采用突然剪断导（地）线的方法松线。","options":{"A":"可以","B":"宜","C":"不应","D":"应该"},"answer":"C","explanation":""},{"id":120,"question":"跨越架中心应在线路中心线上，宽度应考虑施工期间牵引绳或导（地）线风偏后超出新建线路两边线各（   ）m，且架顶两侧应装设外伸羊角。","options":{"A":"1","B":"2","C":"3","D":"4"},"answer":"B","explanation":""},{"id":121,"question":"掘路施工应具备相应的交通组织方案，做好防止交通事故的安全措施。施工区域应用标准路栏等严格分隔，并有明显标记，夜间施工人员应佩戴反光（  )，施工地点应加挂(  )。","options":{"A":"标志牌、警示牌","B":"标志、警示灯","C":"标志、警示牌","D":"标志牌、警示灯"},"answer":"B","explanation":""},{"id":122,"question":"敷设电缆过程中，应有(  )。电缆移动时不应用手搬动滑轮。","options":{"A":"统一调度","B":"专人指挥","C":"统一指挥","D":"专人调度"},"answer":"B","explanation":""},{"id":123,"question":"电力电缆试验要拆除接地线时，应征得（  ）的许可（根据调度员命令装设的接地线，应征得调度员的许可），方可进行。工作完毕后立即恢复。","options":{"A":"工作班人员","B":"工作人员","C":"工作许可人","D":"工作负责人"},"answer":"C","explanation":""},{"id":124,"question":"电缆耐压试验前，加压端应做好安全措施，防止人员误入试验场所。另一端应设置围栏并挂上（  ）。如另一端是杆上的或是开断电缆处，应派人看守。","options":{"A":"警示牌","B":"警告牌","C":"警告标志牌","D":"止步，高压危险"},"answer":"C","explanation":""},{"id":125,"question":"电缆试验前后以及更换试验引线时，应对被试电缆（或试验设备）充分放电，作业人员应戴（  ）。","options":{"A":"棉纱手套","B":"安全帽","C":"绝缘靴","D":"绝缘手套"},"answer":"D","explanation":""},{"id":126,"question":"电缆耐压试验分相进行时，另两相电缆应（  ）。","options":{"A":"间接接地","B":"直接接地","C":"短路接地","D":"接地"},"answer":"C","explanation":""},{"id":127,"question":"电缆试验过程中发生异常情况时，应立即（  ），经放电、接地后方可检查。","options":{"A":"停电","B":"拉闸","C":"断开电源","D":"汇报"},"answer":"C","explanation":""},{"id":128,"question":"风力大于5级（风速大于10.7m/s），或湿度大于（     ）时，不宜进行带电作业。","options":{"A":"0.7","B":"0.75","C":"0.8","D":"0.85"},"answer":"C","explanation":""},{"id":129,"question":"带电作业人员应经专门培训，并经考试合格取得资格且（）书面批准后，方可参加相应的作业。","options":{"A":"外单位","B":"管理部门","C":"本单位","D":"领导"},"answer":"C","explanation":""},{"id":130,"question":"带电作业应设专责监护人。监护人不应直接操作，其监护的范围不应超过（   ）作业点。","options":{"A":"一个","B":"两个","C":"三个","D":"四个"},"answer":"A","explanation":""},{"id":131,"question":"在带电作业过程中如设备突然停电，作业人员应（  ）。设备运维单位或值班调度员未与工作负责人取得联系前，（  ）强送电。","options":{"A":"视设备仍然带电；可以","B":"视设备不带电；不应","C":"视设备仍然带电；不应","D":"视设备不带电；可以"},"answer":"C","explanation":""},{"id":132,"question":"更换绝缘子、移动或开断导线的作业，应有（   ）的后备保护措施。","options":{"A":"防止导线弹跳","B":"防止绝缘子脱落","C":"高空坠落","D":"防止导线脱落"},"answer":"D","explanation":""},{"id":133,"question":"带电作业时，作业区域带电导线、绝缘子等应采取相间、相对地的绝缘遮蔽及隔离措施。绝缘遮蔽、隔离措施的范围应比作业人员活动范围增加（   ）m以上。","options":{"A":"0.2","B":"0.4","C":"0.6","D":"0.8"},"answer":"B","explanation":""},{"id":134,"question":"带电作业实施绝缘遮蔽时，应按（  ）的顺序进行，拆除时顺序相反。安装、拆除绝缘遮蔽时应逐相进行。不应同时安装或拆除不同电位的绝缘遮蔽。","options":{"A":"先远后近、先下后上","B":"先近后远、先下后上","C":"先近后远、先上后下","D":"先远后近、先下后上"},"answer":"B","explanation":""},{"id":135,"question":"电缆旁路作业，旁路电缆屏蔽层应在两终端处引出并可靠接地，接地线的截面积不宜小于（  ）。","options":{"A":"20mm2","B":"22mm2","C":"25mm2","D":"30mm2"},"answer":"C","explanation":""},{"id":136,"question":"进行树木砍剪、清除异物时，应根据树木、异物与带电体间的距离正确选用（  ）。","options":{"A":"缺陷单","B":"操作票","C":"工作票","D":"工单"},"answer":"C","explanation":""},{"id":137,"question":"风力大于（  ）级（风速大于10.7m/s）时，不应砍剪高出或接近导线的树木及清除异物。","options":{"A":"5","B":"6","C":"7","D":"8"},"answer":"A","explanation":""},{"id":138,"question":"树枝接触或接近高压带电导线时，应将高压线路停电或用绝缘工具使树枝（  ）带电导线，采取措施之前人体（  ）接触树木。","options":{"A":"远离；不应","B":"靠近；不应","C":"远离；可以","D":"靠近；可以"},"answer":"A","explanation":""},{"id":139,"question":"为防止树木倒落在导线上，应设法用绳索将其拉向与导线（   ）的方向。","options":{"A":"相反","B":"相同","C":"平行","D":"垂直"},"answer":"A","explanation":""},{"id":140,"question":"电气设备在非检修状态下应视为设备带电，可采用（  ）作业法带电清除设备或线路上异物。","options":{"A":"木棍","B":"绝缘手套","C":"绝缘杆","D":"铁棍"},"answer":"C","explanation":""},{"id":141,"question":"所有异物均应视为（  ），清除作业前应充分评估作业过程中工具及异物的摆动情况，采取符合要求的安全措施，防止发生次生性设备接地与相间短路，防范人身触电、电弧灼伤等风险。","options":{"A":"外来物","B":"危险源","C":"危险物","D":"导电材料"},"answer":"D","explanation":""},{"id":142,"question":"在同一电气连接部分，检修和试验工作（  ）同时进行。","options":{"A":"必须","B":"可以","C":"应","D":"不应"},"answer":"D","explanation":""},{"id":143,"question":"高压试验工作不应少于（  ）。试验负责人应由有经验的人员担任。开始试验前，试验负责人应向全体试验人员详细交代带电部位和安全注意事项。","options":{"A":"一人","B":"两人","C":"三人","D":"四人"},"answer":"B","explanation":""},{"id":144,"question":"试验需要断开设备接头时，断开前应做好（  ），接回后应检查。","options":{"A":"登记","B":"记录","C":"标记","D":"检查"},"answer":"C","explanation":""},{"id":145,"question":"高压试验现场应装设遮栏，遮栏与试验设备高压部分应有足够的安全距离，向外悬挂\"（  ）\"标志牌，并派专人看守。被试设备两端不在同一地点时，一端加压，另一端应派专人看守。","options":{"A":"禁止攀登！","B":"止步，高压危险！","C":"在此工作!","D":"禁止合闸，线路有人工作！"},"answer":"B","explanation":""},{"id":146,"question":"雷电天气时，（  ）测量接地电阻、绝缘电阻及进行高压侧核相工作。沿线出现雷雨天气时不应进行线路测量工作。","options":{"A":"可以","B":"应","C":"不应","D":"允许"},"answer":"C","explanation":""},{"id":147,"question":"电气测量工作，至少应由两人进行，（  ）。夜间测量工作，应有足够的照明。","options":{"A":"一人监护，一人记录","B":"一人操作，一人监护","C":"一人操作，一人记录","D":"一人记录，一人监护"},"answer":"B","explanation":""},{"id":148,"question":"非金属外壳的仪器，应与地绝缘；金属外壳的仪器和仪用变压器外壳应（  ）。","options":{"A":"隔离","B":"绝缘","C":"短路","D":"接地"},"answer":"D","explanation":""},{"id":149,"question":"除使用特殊仪器外，所有使用携带型仪器的测量工作，均应在电流互感器和电压互感器的（  ）进行。","options":{"A":"电源侧","B":"一次侧","C":"二次侧","D":"负荷侧"},"answer":"C","explanation":""},{"id":150,"question":"连接电流回路的导线截面，应适合所测电流数值。连接电压回路的导线截面不应小于（  ）。","options":{"A":"0.5mm2","B":"1mm2","C":"1.5mm2","D":"2mm2"},"answer":"C","explanation":""},{"id":151,"question":"在测量高压电缆各相电流时，电缆头线间距离应在（  ）以上，且绝缘良好、测量方便的，方可进行。当有一相接地时，不应测量。","options":{"A":"400mm","B":"300mm","C":"200mm","D":"100mm"},"answer":"B","explanation":""},{"id":152,"question":"测量用的导线，应使用相应的绝缘导线，其端部应有（  ）。","options":{"A":"保护层","B":"护套","C":"绝缘层","D":"绝缘套"},"answer":"D","explanation":""},{"id":153,"question":"测量设备绝缘电阻时，应将被测设备从（  ）断开，验明无电压，确认设备无人工作后，方可进行。在测量中不应让他人接近被测量设备。在测量绝缘前后，应将被测量设备对地放电。","options":{"A":"高压侧","B":"低压侧","C":"各方面","D":"中压侧"},"answer":"C","explanation":""},{"id":154,"question":"测量杆塔、配电变压器和避雷器的接地电阻，可在线路、设备带电的情况下进行。解开或恢复杆塔、配电变压器和避雷器接地引线时，应戴（  ）。不应直接接触与地电位断开的接地引线。","options":{"A":"护目镜","B":"绝缘手套","C":"绝缘靴","D":"安全帽"},"answer":"B","explanation":""},{"id":155,"question":"高压侧核相时应戴绝缘手套，使用（  ）的核相器，并逐相进行。","options":{"A":"低一个电压等级","B":"相应电压等级","C":"高一个电压等级","D":"接近的电压等级"},"answer":"B","explanation":""},{"id":156,"question":"低压电气工作前，应用（    ）检验检修设备、金属外壳和相邻设备是否有电。","options":{"A":"手背","B":"绝缘棒","C":"低压验电器或测电笔","D":"绝缘绳"},"answer":"C","explanation":""},{"id":157,"question":"电容器柜内工作，应在（  ）电容器的电源、（  ）充分放电后，方可进行。","options":{"A":"断开；逐相","B":"合上；逐相","C":"断开；三相同时","D":"合上；三相同时"},"answer":"A","explanation":""},{"id":158,"question":"低压不停电作业时，作业人员应穿绝缘鞋和全棉长袖工作服，戴低压绝缘手套或（    ）、护目镜或防弧面罩和安全帽，并保持对地绝缘。","options":{"A":"帆布手套","B":"棉纱手套","C":"橡胶手套","D":"皮革手套"},"answer":"A","explanation":""},{"id":159,"question":"开展低压不停电作业，断开导线时，应（  ）。断开的引线、线头应采取绝缘包裹等遮蔽措施。搭接导线时，顺序应相反。","options":{"A":"先断开相线，后断开零线","B":"先断开零线，后断开相线","C":"先断相线或零线均可","D":"同时断开相线和零线"},"answer":"A","explanation":""},{"id":160,"question":"接线或拆线作业应逐相完成，并恢复该相绝缘后，方可进行下一步的作业。人体（  ）同时接触两根线头。","options":{"A":"必须","B":"可以","C":"应该","D":"不应"},"answer":"D","explanation":""},{"id":161,"question":"作业范围内电气回路的剩余电流动作保护装置（剩余电流动作保护器）应（  ）运行。","options":{"A":"投入","B":"退出","C":"停止","D":"禁止"},"answer":"A","explanation":""},{"id":162,"question":"工作人员在现场工作过程中，凡遇到异常情况（如直流系统接地等）或断路器跳闸时，应立即停止工作，保持现状，待查明原因，确定与本工作无关时方可继续工作；若是本身工作所引起，应保留现场并立即通知（  ），以便及时处理。","options":{"A":"工作票签发人","B":"领导","C":"工作许可人","D":"交底人"},"answer":"C","explanation":""},{"id":163,"question":"工作中应确保电流互感器和电压互感器的二次绕组（  ）。","options":{"A":"应有永久性的保护接地","B":"应有永久性的、可靠的保护接地","C":"应有且仅有一点永久的保护接地","D":"应有两点的保护接地"},"answer":"C","explanation":""},{"id":164,"question":"工作中，需临时退出有关保护装置、配电自动化装置、安全自动装置或自动化监控系统时，应向调度申请，经（  ）或运维负责人同意，方可执行。","options":{"A":"工作许可人","B":"值班调度员","C":"工作负责人","D":"调度负责人"},"answer":"B","explanation":""},{"id":165,"question":"（  ）在二次系统上接取试验电源。","options":{"A":"不应","B":"应该","C":"可以","D":"宜"},"answer":"A","explanation":""},{"id":166,"question":"工作过程中，工作人员触摸插件电路时应采取可靠的(   )。","options":{"A":"防静电措施，防止人身伤亡","B":"防静电措施，防止设备损坏","C":"防触电措施，防止设备损坏","D":"防触电措施，防止人身伤亡"},"answer":"B","explanation":""},{"id":167,"question":"不停电更换经互感器接入的电能表、计量终端作业时，参照《安规第3部分：配电》 二次设备作业的有关规定执行。装拆时应（  ）二次电流并确认短接牢靠，（  ）二次电压，安装完成后需先恢复二次电压后恢复二次电流。","options":{"A":"先短接；后断开","B":"先断开；后短接","C":"先并联；后短接","D":"先串联；后短接"},"answer":"A","explanation":""},{"id":168,"question":"动火现场及周围的（  ）应清除，或已采取其他有效的防火安全措施，配备足够适用的消防器材。","options":{"A":"易燃物品","B":"杂物","C":"金属物品","D":"消防器材"},"answer":"A","explanation":""},{"id":169,"question":"动火工作负责人，宜具备电气工作票（  ）资格。动火作业作为电气工作票的附加工作时，电气工作票负责人（  ）担任动火工作负责人。","options":{"A":"工作负责人；可以","B":"工作负责人；不应","C":"工作许可人；可以","D":"工作许可人；不应"},"answer":"B","explanation":""},{"id":170,"question":"动火工作票签发人（  ）兼任动火工作负责人。动火工作票审批人、动火工作监护人（   ） 签发动火工作票。","options":{"A":"不应；不应","B":"不应；可以","C":"可以；可以","D":"可以；不应"},"answer":"A","explanation":""},{"id":171,"question":"一级动火作业，间断时间超过（  ） ，继续动火前，应重新测定可燃气体、易燃液体的可燃蒸汽含量，合格后方可重新动火。","options":{"A":"1h","B":"2h","C":"3h","D":"4h"},"answer":"B","explanation":""},{"id":172,"question":"使用中的氧气瓶和乙炔气瓶应垂直固定放置，氧气瓶和乙炔气瓶的距离不应小于（    ）m。","options":{"A":"2","B":"3","C":"4","D":"5"},"answer":"D","explanation":""},{"id":173,"question":"气瓶不应在烈日下曝晒，放置地点不应靠近热源，应距明火（    ）m以外。","options":{"A":"8","B":"9","C":"10","D":"11"},"answer":"C","explanation":""},{"id":174,"question":"遇有雨、雪、大雾、照明不足、指挥人员看不清工作地点或起重机操作人员未获得有效指挥时，不应进行起重工作。当风力大于（   ）级（风速大于7.9m/s）时，不应起吊受风面积较大的物体。","options":{"A":"4","B":"5","C":"6","D":"7"},"answer":"A","explanation":""},{"id":175,"question":"起重机械应安装接地装置，接地线应用多股软铜线，截面不应小于（   ）mm2，并满足接地短路容量的要求。","options":{"A":"15","B":"16","C":"20","D":"25"},"answer":"B","explanation":""},{"id":176,"question":"用跳板或圆木装卸滚动物件时，应用绳索控制物件。物件滚落（  ）不应有人。","options":{"A":"右方","B":"左方","C":"前方","D":"后方"},"answer":"C","explanation":""},{"id":177,"question":"绝缘隔板和绝缘罩应存放在室内干燥、离地面（   ）mm以上的架上或专用的柜内。使用前应擦净灰尘。如果表面有轻度擦伤，应涂绝缘漆处理。","options":{"A":"150","B":"200","C":"250","D":"300"},"answer":"B","explanation":""},{"id":178,"question":"安全工器具应（    ）进行外观检查。","options":{"A":"每周及使用前","B":"每周及使用时","C":"每月及使用前","D":"每月及使用时"},"answer":"C","explanation":""},{"id":179,"question":"安全带的安全绳同主带的连接点应固定于佩戴者的（   ）。","options":{"A":"前胸","B":"双肩","C":"腿部","D":"后背、后腰或前胸"},"answer":"D","explanation":""},{"id":180,"question":"保险带、绳使用长度在(   )m以上的应加缓冲器。","options":{"A":"1","B":"2","C":"3","D":"4"},"answer":"B","explanation":""},{"id":181,"question":"脚扣和登高板的金属部分变形和损伤者（  ）。","options":{"A":"可以继续使用","B":"不应使用","C":"使用过程中需当心","D":"不影响使用"},"answer":"B","explanation":""},{"id":182,"question":"带电作业工具房进行通风时，应在室外相对湿度小于（  ）的干燥天气进行。通风结束后，应立即检查室内的相对湿度，并加以调控。","options":{"A":"0.4","B":"0.45","C":"0.75","D":"0.8"},"answer":"C","explanation":""},{"id":183,"question":"严禁在（  ）的情况下组织生产。","options":{"A":"安全生产条件完备","B":"高温","C":"安全生产条件不具备","D":"低温"},"answer":"C","explanation":""},{"id":184,"question":"严禁使用不具备（  ）的承包商。","options":{"A":"规定资质","B":"安全生产保障能力","C":"规定资质和作业能力","D":"规定资质和安全生产保障能力"},"answer":"D","explanation":""},{"id":185,"question":"严禁未经安全教育培训并（  ）的人员上岗作业。","options":{"A":"经过考试","B":"考试合格","C":"经过领导认可","D":"获得学分"},"answer":"B","explanation":""},{"id":186,"question":"严禁（  ）的生产用具。","options":{"A":"不正确配备","B":"使用不合格","C":"不正确配备或使用 遮栏（围栏），并在相应部位设警戒范围或警示标识。","options":{"A":"城区","B":"人口密集区","C":"通行道路上","D":"交通道口"},"answer":["A","B","C","D"],"explanation":""},{"id":14,"question":"临时用电检修电源箱应装（）。","options":{"A":"自动空气开关","B":"剩余电流动作保护器","C":"刀闸","D":"接线柱或插座"},"answer":["A","B","D"],"explanation":""},{"id":15,"question":"以下对施工电源保护地线（PE）说法正确的是（ ）","options":{"A":"不应断线","B":"不应在保护地线装设开关","C":"不应在保护地线装设熔断器","D":"不应在保护地线通过工作电流"},"answer":["A","B","C","D"],"explanation":""},{"id":16,"question":"开展抢修工作应做好（），防止发生次生灾害。","options":{"A":"风险评估","B":"风险分析","C":"安全措施","D":"应急措施"},"answer":["B","C"],"explanation":""},{"id":17,"question":"保证安全的组织措施工作流程由（  ）工作许可及安全交代、工作监护、工作间断、工作转移、工作变更和延期、工作终结组成。","options":{"A":"现场勘察","B":"方案选择","C":"工作票组织","D":"工作票启用"},"answer":["A","C","D"],"explanation":""},{"id":18,"question":"现场勘察应查看检修或施工作业需要停电的范围、需退出的二次设备及相关回路、（  ）、地下管线设施和作业现场的条件、环境及其他影响作业的危险点。","options":{"A":"工作地点保留的带电部位","B":"同杆架设","C":"需装设接地线的位置","D":"需装设的绝缘挡板"},"answer":["A","C","D"],"explanation":""},{"id":19,"question":"作业单位依据勘察情况，对（  ）较大的作业项目，应制订有针对性的专项工作方案。","options":{"A":"危险性","B":"复杂性","C":"困难程度","D":"风险"},"answer":["A","B","C"],"explanation":""},{"id":20,"question":"工作票签发人在工作票组织中的安全职责包括（   ）。","options":{"A":"确认工作班人员变动是否合适","B":"确认工作必要性和安全性","C":"确认工作票所列安全措施正确、完备","D":"确认所派工作负责人和工作班人员适当、充足。"},"answer":["B","C","D"],"explanation":""},{"id":21,"question":"工作负责人（监护人）在工作票组织中的安全职责包括（）、正确、安全地组织工作。工作前应向工作班全体人员进行安全交代。关注工作人员身体和精神状况是否正常以及工作班人员变动是否合适。监护工作班人员执行现场安全措施和技术措施、正确使用劳动防护用品和工器具，在作业中不发生违章指挥、违章作业、违反劳动纪律的行为。","options":{"A":"开展现场勘察，正确完整地填写工作票","B":"确认工作票所列安全措施正确、完备，符合现场实际条件，必要时予以补充。","C":"组织实施工作票所列由其负责的安全措施，核实已做完的所有安全措施是否符合作业安全要求。","D":"审核工作负责人和工作班人员是否适当、充足"},"answer":["A","B","C"],"explanation":""},{"id":22,"question":"专责监护人在工作票组织中的安全职责包括（  ）。","options":{"A":"明确被监护人员、监护范围和内容","B":"工作前对被监护人员交代安全措施，告知危险点和安全注意事项","C":"监督被监护人员执行本规程和现场安全措施，及时纠正不安全行","D":"及时发现并制止被监护人员违章指挥、违章作业和违反劳动纪律的行为"},"answer":["A","B","C","D"],"explanation":""},{"id":23,"question":"工作班（作业）人员在工作票组织中的安全职责包括（  ） 、服从工作负责人的指挥和专责监护人的监督，执行现场安全工作要求和安全注意事项，执行现场安全工作要求和安全注意事项和相互关心作业安全，不伤害自己，不伤害他人，不被他人伤害和保护他人不受伤害。","options":{"A":"熟悉工作内容、流程，掌握安全措施，明确工作中的危险点，并履行签名确认手续","B":"遵守各项安全规章制度、技术规程和劳动纪","C":"发现现场安全措施不适应工作时，应及时提出异议","D":"正确使用工器具和劳动防护用品"},"answer":["A","B","C","D"],"explanation":""},{"id":24,"question":"工作班人员应具有较强的安全意识、相应的安全技能及必要的作业技能；清楚并掌握（  ）、存在的安全风险及应采取的控制措施。","options":{"A":"工作任务和内容","B":"工作地点","C":"存在的安全风险","D":"应采取的控制措施"},"answer":["A","B","C","D"],"explanation":""},{"id":25,"question":"可共用一张配电第一种工作票的工作有：","options":{"A":"一条线路上，同时停送电的工作","B":"同一个电气连接部位或同杆塔架设、同沟（槽）敷设，同时停送电的几条高压配电线路上的工作","C":"不同高压配电线路需改造形成同一个电气连接部位，且同时停送电的几条线路上的工作","D":"同一配电站、配电开关站内，全部停电或属于同一电压等级且同时停送电的几个电气连接部位上的工作"},"answer":["A","B","C","D"],"explanation":""},{"id":26,"question":"属计划性工作，应在工作前12h或前一天17时前送达许可部门的工作票包括（   ）。","options":{"A":"配电第一种工作票","B":"需调度或设备运维单位负责的安全措施的带电作业工作票、配电第二种工作票","C":"不需调度或设备运维单位负责的安全措施的配电第二种工作票","D":"紧急抢修工作票、书面布置记录票"},"answer":["A","B"],"explanation":""},{"id":27,"question":"可在工作开始前送达许可部门的工作票包括（    ）。","options":{"A":"不需调度或设备运维单位负责的安全措施的配电第二种工作票","B":"紧急抢修工作票、书面布置记录票","C":"需临时工作的工作票","D":"因特殊原因，需要重新办理的工作票"},"answer":["A","B","C","D"],"explanation":""},{"id":28,"question":"带电作业工作负责人在带电作业工作开始前，应与（　）或（　　）联系并履行有关许可手续。","options":{"A":"工作许可人","B":"设备运维单位","C":"值班调度员","D":"值班负责人"},"answer":["B","C"],"explanation":""},{"id":29,"question":"工作负责人或分组工作负责人安全交代的内容，应包括（ ）及注意事项等。","options":{"A":"工作任务及分工","B":"作业地点及范围","C":"作业环境及风险","D":"安全措施"},"answer":["A","B","C","D"],"explanation":""},{"id":30,"question":"室外工作，如遇雷、雨、风等恶劣天气或其他可能危及作业人员安全的情况时，（  ）根据实际情况，有权决定临时停止工作。","options":{"A":"上级领导","B":"工作负责人","C":"专责监护人","D":"政府部门"},"answer":["B","C"],"explanation":""},{"id":31,"question":"工作终结是指（   ）。","options":{"A":"工作负责人所做的作业终结","B":"工作票的终结","C":"调度检修申请单的终结","D":"盖工作票终结章"},"answer":["B","C"],"explanation":""},{"id":32,"question":"全部作业结束，作业人员（   ）、（   ），任何人未经工作负责人许可，不应进入工作现场。","options":{"A":"撤离现场前","B":"撤离现场后","C":"办理作业终结前","D":"办理作业终结后"},"answer":["B","C"],"explanation":""},{"id":33,"question":"应断开停电设备各可能来电侧()、()和()。","options":{"A":"断路 question":"使用临时拉线的安全要求有：","options":{"A":"不应利用树木或外露岩石作受力桩","B":"一个锚桩上的临时拉线不应超过两根","C":"临时拉线不应固定在有可能移动或其他不可靠的物体上","D":"临时拉线绑扎工作应由有经验的人员担任"},"answer":["A","B","C","D"],"explanation":""},{"id":45,"question":"登杆塔前，应检查（   ）是否牢固。","options":{"A":"杆号牌","B":"杆根","C":"基础","D":"拉线"},"answer":["B","C","D"],"explanation":""},{"id":46,"question":"（   ）工作均应专人指挥、统一信号，并做到通信畅通，做好监护。","options":{"A":"放线","B":"紧线","C":"撤线","D":"剪线"},"answer":["A","B","C"],"explanation":""},{"id":47,"question":"放线、紧线与撤线作业时，工作人员不应站或跨在以下位置：","options":{"A":"已受力的牵引绳、导（地）线的内角侧及正上方","B":"牵引绳或架空线的垂直下方","C":"导（地）线及牵引绳圈内","D":"导（地）线及牵引绳圈外"},"answer":["A","B","C"],"explanation":""},{"id":48,"question":"电缆隧道、电缆井内应有充足的照明，并有（   ）的措施。","options":{"A":"防火","B":"防水","C":"防爆","D":"通风"},"answer":["A","B","D"],"explanation":""},{"id":49,"question":"带电作业应在良好天气下进行。风力大于（  ），或湿度大于（   ）时，不宜进行带电作业。","options":{"A":"5级（风速大于10.7m/s）","B":"6级（风速大于10.7m/s）","C":"0.8","D":"0.85"},"answer":["A","C"],"explanation":""},{"id":50,"question":"紧急情况下必须在恶劣天气进行带电作业时，应充分论证并制定必要的安全措施，经本单位（   ）或（    ）批准后方可进行。","options":{"A":"主要负责人","B":"分管生产负责人","C":"安全总监","D":"总工程师"},"answer":["B","D"],"explanation":""},{"id":51,"question":"带电作业（    ）应由具有带电作业实践工作经验的人员担任，工作负责人应具备带电作业资格。","options":{"A":"工作票签发人","B":"工作负责人","C":"专责监护人","D":"工作班成员"},"answer":["A","B","C"],"explanation":""},{"id":52,"question":"带电断、接空载线路，在查明线路（    ）后，方可进行带电断、接引线。","options":{"A":"确无接地","B":"绝缘良好","C":"线路上无人工作","D":"相位确定无误"},"answer":["A","B","C","D"],"explanation":""},{"id":53,"question":"砍剪树木应有专人监护。待砍剪的树木下方和倒树范围内不应有人逗留，（    ）应设置围栏或警示带。","options":{"A":"城区","B":"郊区","C":"山区","D":"人口密集区"},"answer":["A","D"],"explanation":""},{"id":54,"question":"低压电气工作前，应用低压验电器或测电笔检验(    )、(    )和（    ）是否有电。","options":{"A":"检修设备","B":"相邻设备","C":"运行设备","D":"金属外壳"},"answer":["A","B","D"],"explanation":""},{"id":55,"question":"所有（    ）或（     ）、（    ）等可靠隔绝电源措施的低压线路、设备都应视为带电。","options":{"A":"未接地","B":"未采取绝缘遮蔽","C":"断开点加锁挂牌","D":"加装绝缘隔板"},"answer":["A","B","C"],"explanation":""},{"id":56,"question":"作业人员应穿绝缘鞋和全棉长袖工作服，戴（    ）或（    ）、（    ）或（    ）和安全帽，并保持对地绝缘。","options":{"A":"低压绝缘手套","B":"帆布手套","C":"护目镜","D":"防弧面罩"},"answer":["A","B","C","D"],"explanation":""},{"id":57,"question":"以下情况不应动火作业：（    ）","options":{"A":"压力容器或管道未泄压前","B":"喷漆、喷砂现场","C":"油船、油车停靠区域","D":"风力大于5级（风速大于7.9m/s）的露天作业"},"answer":["A","B","C"],"explanation":""},{"id":58,"question":"动火区域划分为（    ）","options":{"A":"一级动火区","B":"二级动火区","C":"三级动火区","D":"其他区域"},"answer":["A","B","D"],"explanation":""},{"id":59,"question":"动火工作票所列组织人员主要包括（   ）、动火工作票签发人（会签人）、（    ）、（    ）、动火工作监护人和动火执行人。","options":{"A":"动火工作负责人","B":"动火工作审批人","C":"动火工作许可人","D":"动火工作人员"},"answer":["A","B","C"],"explanation":""},{"id":60,"question":"动火工作负责人的安全职责有（    ）","options":{"A":"正确完整填写工作票","B":"确认动火安全措施正确、完备，符合现场实际条件，必要时进行补充","C":"正确安全地组织动火工作","D":"始终监督现场动火工作"},"answer":["A","B","C","D"],"explanation":""},{"id":61,"question":"动火执行人的安全职责有（    ）","options":{"A":"检查动火现场是否配备必要、足够的消防设施","B":"动火前应收到经审核批准且允许动火作业的动火工作票","C":"按本工种规定的防火安全要求做好安全措施","D":"全面了解动火工作任务和要求，并在规定的范围内执行动火"},"answer":["B","C","D"],"explanation":""},{"id":62,"question":"安全工器具存放环境应干燥通风；绝缘安全工器具应存放于温度（   ）、相对湿度不大于（   ）的环境中。","options":{"A":"-15℃～40℃","B":"-10℃～45℃","C":"0.8","D":"0.85"},"answer":["A","C"],"explanation":""},{"id":63,"question":"严禁四违指的是（  ）。","options":{"A":"严禁违反安全生产令","B":"严禁违章指挥","C":"严禁违章作业","D":"严禁违反劳动纪律"},"answer":["B","C","D"],"explanation":""},{"id":64,"question":"《安全生产禁令》第五条：严禁设备超\n（ ）运行。","options":{"A":"超裕度","B":"超限额","C":"超能力","D":"超时限"},"answer":["B","C"],"explanation":""},{"id":65,"question":"《安全生产禁令》第七条：严禁未经（ ）。","options":{"A":"批准作业","B":"违规无票工作","C":"违规无监护操作","D":"违规解锁"},"answer":["A","B","C","D"],"explanation":""},{"id":66,"question":"《安全生产禁令》第八条：严禁未按规定落实（     ）、（      ）、（     ）等防触电措施开展作业。","options":{"A":"停电","B":"验电","C":"接地","D":"挂接地线"},"answer":["A","B","C"],"explanation":""},{"id":67,"question":"《安全生产禁令》第九条：严禁未落实\n（  ）措施开展高处作业。","options":{"A":"防坠落","B":"防倒杆","C":"停电","D":"验电"},"answer":["A","B"],"explanation":""}],"判断题":[{"id":1,"question":"外来作业人员及其直接管理人员参与工作前应对本规程进行考试。考试合格前能参加工作。（ ）","answer":"错误","explanation":""},{"id":2,"question":"在有爆炸危险的场所，不应利用金属管道、构筑物的金属构架及电气线路的工作零线作为接地线或零线使用。（ ）","answer":"正确","explanation":""},{"id":3,"question":"本单位工作票签发人或工作负责人认为有必要时，应组织现场勘察。设备运维单位或项目管理单位在外单位办理工作票前，应开展安全技术交底；当存在应开展现场勘察的作业情形或认为有必要时，应先组织现场勘察再进行安全技术交底。（ ）","answer":"正确","explanation":""},{"id":4,"question":"作业前，工作负责人或工作许可人若认为现场实际情况与原勘察结果可能发生变化时，应重新核实。（ ）","answer":"正确","explanation":""},{"id":5,"question":"确认已布置的安全措施符合工作票许可要求，防范可能来电的安全措施完整可靠是工作许可人在工作票组织中的安全责任。（ ）","answer":"正确","explanation":""},{"id":6,"question":"工作负责人不应兼任该项工作的工作票签发人（会签人）、工作许可人及工作班人员。(     )","answer":"正确","explanation":""},{"id":7,"question":"人员相互兼任时，应同时具备相应的人员资质，并履行相应的安全职责。（ ）","answer":"正确","explanation":""},{"id":8,"question":"专责监护人应具有相应且足够的工作经验，能及时发现作业人员身体和精神状况的异常。（ ）","answer":"正确","explanation":""},{"id":9,"question":"不需要高压配电网停电或做安全措施的低压配电网工作时应选用书面布置记录票。（ ）","answer":"正确","explanation":""},{"id":10,"question":"树木与高压带电线路净空距离大于表2规定的安全距离的砍剪树木工作不需办理工作票，但应选用《书面布置记录票》。（ ）","answer":"正确","explanation":""},{"id":11,"question":"配电终端、五防、监测、智能运维、安防等设备的维护，不需运行设备停电，且与带电设备距离大于表1作业安全距离的工作，应选用《书面布置记录票》。(     )","answer":"正确","explanation":""},{"id":12,"question":"同一电压等级、同类型采取相同安全措施的数条高压配电线路上依次进行的带电作业，可共用同一张带电作业工作票。（ ）","answer":"正确","explanation":""},{"id":13,"question":"路（电缆）、用户的检修班组或施工单位进入厂站对其管辖的线路（电缆）设备进行工作，可选用配电工作票。若在厂站内其他设备（电缆）上工作，应填用线路工作票。（ ）","answer":"错误","explanation":""},{"id":14,"question":"使用一张工作票且需下设多个分组的工作，应使用《分组工作派工单》（见附录C），在工作票所列安全措施基础上，各分组可结合实际增加安全措施及注意事项。（ ）","answer":"正确","explanation":""},{"id":15,"question":"若一张工作票下设多个分组工作，每个分组应分别指定分组工作负责人（监护人），可不使用分组工作派工单。（ ）","answer":"错误","explanation":""},{"id":16,"question":"工作票填写：工作班分组时，填写分组工作负责人姓名，并注明包括该分组工作负责人在内的分组总人数。（ ）","answer":"正确","explanation":""},{"id":17,"question":"使用公司工作票到接入公司电网的用户电气设备或用户管辖区域内公司资产设备上工作时，工作票应由用户单位签发。（ ）","answer":"错误","explanation":""},{"id":18,"question":"工作票许可分为调度直接许可和调度间接许可两种许可方式。（ ）","answer":"正确","explanation":""},{"id":19,"question":"工作许可时，工作许可人、工作负责人任何一方可以擅自变更调度或设备运维单位的安全措施。（ ）","answer":"错误","explanation":""},{"id":20,"question":"用户侧设备检修，需电网侧设备配合停电时，应得到用户停、送电联系人的书面申请，经批准后方可停电。在电网侧设备停电措施实施前，由电网侧设备运维单位或调度许可人负责向用户停、送电联系人许可。（ ）","answer":"错误","explanation":""},{"id":21,"question":"在用户设备上工作，许可工作前，工作负责人应检查确认用户设备的运行状态、安全措施符合作业的安全要求。作业前检查多电源和有自备电源的用户，应已采取机械或电气联锁等防反送电的强制性技术措施。 （ ）","answer":"正确","explanation":""},{"id":22,"question":"不应约时停、送电。（ ）","answer":"正确","explanation":""},{"id":23,"question":"室外工作，如遇雷、雨、风等恶劣天气或其他可能危及作业人员安全的情况时，工作负责人或专责监护人根据实际情况，有权决定临时停止工作。（ ）","answer":"正确","explanation":""},{"id":24,"question":"作业人员离开工作现场，工作票所列安全措施不变，宜办理工作间断，但每次复工前应检查安全措施正确完好。（ ）","answer":"正确","explanation":""},{"id":25,"question":"工作间断时，工作班人员应从工作现场撤出，工作地点的所有安全措施可保持不变。（ ）","answer":"正确","explanation":""},{"id":26,"question":"填用数日内有效的工作票且每天间断时，应清理现场，办理工作间断手续；复工时，应由工作负责人和工作许可人办理工作许可手续。每日收工时若将工作地点所装设的接地线拆除，次日恢复工作前应重新验电、接地。（ ）","answer":"正确","explanation":""},{"id":27,"question":"使用同一张工作票开展的分区段依次进行的停电检修工作，工作班自行装设的接地线等安全措施可分段执行。（ ）","answer":"正确","explanation":""},{"id":28,"question":"紧急抢修工作票只能延期一次。（ ）","answer":"错误","explanation":""},{"id":29,"question":"全部作业结束，作业人员撤离现场后、办理作业终结前，任何人员未经工作负责人许可，不应进入工作现场。（ ）","answer":"正确","explanation":""},{"id":30,"question":"分组工作负责人宜具备工作负责人资格。（ ）","answer":"正确","explanation":""},{"id":31,"question":"接地线或个人保安线应接触良好、连接可靠。可以采用缠绕的方法进行接地或短路。","answer":"错误","explanation":""},{"id":32,"question":"使用分组工作派工单分组工作时，分组负责的工作接地线已装设完成，经工作负责人核实满足工作条件并同意前，该分组可开始工作。（ ）","answer":"错误","explanation":""},{"id":33,"question":"高压设备停电检修工作，作业人员应在接地刀闸（接地线）的保护范围内作业。不应在无接地或接地不齐全的情况下进行停电检修作业。( )","answer":"正确","explanation":""},{"id":34,"question":"必要时可应用个人保安线代替接地线。","answer":"错误","explanation":""},{"id":35,"question":"工作班组自行装设接地线时应填写\"现场工作接地线使用登记管理表\"，并作为工作负责人收执工作票的附件保存。（ ）","answer":"正确","explanation":""},{"id":36,"question":"特殊情况下，有饮酒、精神不振时，可以登高作业。( )","answer":"错误","explanation":""},{"id":37,"question":"高处作业人员在转移位置时不应失去安全带的保护。（ ）","answer":"正确","explanation":""},{"id":38,"question":"在进行高处作业时，应视情况在工作地点的下方及坠物可能落到的地方通行或逗留，防止落物伤人。（ ）","answer":"错误","explanation":""},{"id":39,"question":"高空作业车、带电作业车、高处作业平台等在作业过程中应处于稳定状态，人员在开展高处作业时可移动设备。（ ）","answer":"错误","explanation":""},{"id":40,"question":"特殊天气的高处作业：在风力大于5级（风速大于10.7m/s）的大风以及暴雨、雷电、冰雹、大雾、沙尘暴等恶劣天气下，应停止露天高处作业。（ ）","answer":"正确","explanation":""},{"id":41,"question":"配电设备的监护操作应由该设备运维单位的运维人员或取得该单位相应资格的人员监护。（ ）","answer":"正确","explanation":""},{"id":42,"question":"根据调度命令或本单位任务完成电气设备操作的一个操作任务，应选用《现场电气操作票》。（ ）","answer":"正确","explanation":""},{"id":43,"question":"监护操作应由两人执行，一人操作，一人监护。操作人在操作过程中不应有任何未经监护人同意的操作行为。（ ）","answer":"正确","explanation":""},{"id":44,"question":"操作临时变更时，应按实际情况修改操作票方可继续进行倒闸操作。（ ）","answer":"错误","explanation":""},{"id":45,"question":"操作票的操作全部结束后，监护人应再次检查操作项目有无错误或遗漏，确认无误后，办理操作票结束手续，并向发令人或值班负责人汇报。（ ）","answer":"正确","explanation":""},{"id":46,"question":"发生人身触电时，可不经许可，立即断开有关设备的电源，但事后应及时报告设备有关单位。（ ）","answer":"正确","explanation":""},{"id":47,"question":"电气设备变位操作后，应对位置变化进行核对并确认。无法观察实际位置时，可通过间接方式确认该设备已操作到位。（ ）","answer":"正确","explanation":""},{"id":48,"question":"单人操作时，可以进行登高或登杆操作。（ ）","answer":"错误","explanation":""},{"id":49,"question":"远方操作设备后，必要时应在现场增加位置检查人或监护人，现场人员应确保自身安全。（ ）","answer":"错误","explanation":""},{"id":50,"question":"手动操作有机械传动的断路器(负荷开关）、隔离开关或接地刀闸时，应戴绝缘手套；手动操作没有机械传动的断路器(负荷开关）、隔离开关或接地刀闸时，应使用绝缘棒并戴绝缘手套。（ ）","answer":"正确","explanation":""},{"id":51,"question":"构件连接对孔时，不应将手指伸入螺孔找正。（ ）","answer":"正确","explanation":""},{"id":52,"question":"某运行班组在开断电缆前，应与电缆图纸核对是否相符，并使用专用仪器确定作业对象电缆停电后，用接地的带绝缘柄的铁钎或电缆试扎装置扎入电缆芯后方可作业。扶绝缘柄的人应戴绝缘手套和护目镜并站在绝缘垫上，同时采取防灼伤措施。（ ）","answer":"正确","explanation":""},{"id":53,"question":"电缆耐压试验前，加压端应做好安全措施，防止人员误入试验场所。另一端应设置围栏并挂上警告标志牌。如另一端是杆上的或是开断电缆处，应派人看守。（     ）","answer":"正确","explanation":""},{"id":54,"question":"在带电作业过程中如设备突然停电，作业人员应视设备不带电。设备运维单位或值班调度员未与工作负责人取得联系前，不应强行送电。（ ）","answer":"错误","explanation":""},{"id":55,"question":"带电作业实施绝缘遮蔽时，应按先近后远、先下后上的顺序进行，拆除时顺序相反。（ ）","answer":"正确","explanation":""},{"id":56,"question":"带电、停电配合作业的项目，当带电、停电作业工序转换时，双方工作负责人应进行安全措施交接，确认无误后，方可开始工作。（ ）","answer":"错误","explanatio ":""},{"id":77,"question":"拴挂固定滑车的桩或锚，应埋设牢固。（）","answer":"正确","explanation":""},{"id":78,"question":"作业中，人员不应跨越正在作业的卷扬钢丝绳。（）","answer":"正确","explanation":""},{"id":79,"question":"不应采用突然剪断导（地）线的方法松线。（）","answer":"正确","explanation":""},{"id":80,"question":"携带型接地线宜存放在专用架上，架上的号码与接地线的号码可以不一致。（）","answer":"错误","explanation":""}]};
// State
let currentPage = 'home';
let pageStack = [];
let wrongBook = JSON.parse(localStorage.getItem('wrongBook') || '[]');
// 顺序刷题状态
let studyState = { type: 'all', questions: [], index: 0, answered: false, selectedOptions: [] };
// 模拟考试状态
let examState = { questions: [], answers: {}, timer: null, timeLeft: 3600, submitted: false };
// 错题本状态
let reviewState = { questions: [], index: 0, answered: false, selectedOptions: [] };

function $(id) { return document.getElementById(id); }
function go(page) {
  pageStack.push(currentPage);
  currentPage = page;
  render();
}
function goBack() {
  if (pageStack.length > 0) {
    currentPage = pageStack.pop();
    render();
  } else {
    currentPage = 'home';
    render();
  }
}
function setHeader(title, showBack) {
  $('headerTitle').textContent = title;
  $('backBtn').style.display = showBack ? '' : 'hidden';
}
function saveWrongBook() {
  localStorage.setItem('wrongBook', JSON.stringify(wrongBook));
}
function addToWrongBook(q, type) {
  const key = type + '_' + q.id;
  if (!wrongBook.find(w => w.key === key)) {
    wrongBook.push({ key, type, question: q });
    saveWrongBook();
  }
}
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function formatTime(s) {
  const m = Math.floor(s / 60);
  const ss = s % 60;
  return String(m).padStart(2,'0') + ':' + String(ss).padStart(2,'0');
}
function countTotal(qs) { return qs.filter(q => q.type !== '判断').length; }

// 渲染
function render() {
  switch (currentPage) {
    case 'home': renderHome(); break;
    case 'study': renderStudy(); break;
    case 'studySelect': renderStudySelect(); break;
    case 'exam': renderExam(); break;
    case 'examResult': renderExamResult(); break;
    case 'wrongbook': renderWrongbook(); break;
    case 'review': renderReview(); break;
  }
}

// 首页
function renderHome() {
  setHeader('电力安全答题', false);
  const danxuan = allQuestions['单选题'].length;
  const duoxuan = allQuestions['多选题'].length;
  const panduan = allQuestions['判断题'].length;
  $('app').innerHTML = `
    <div class="page">
      <div class="card">
        <div class="card-title">题库概览</div>
        <div class="stat-grid">
          <div class="stat-item"><div class="stat-num">${danxuan}</div><div class="stat-label">单选题</div></div>
          <div class="stat-item"><div class="stat-num">${duoxuan}</div><div class="stat-label">多选题</div></div>
          <div class="stat-item"><div class="stat-num">${panduan}</div><div class="stat-label">判断题</div></div>
        </div>
        <div class="card-desc">共计 ${danxuan + duoxuan + panduan} 题电力安全知识题库</div>
      </div>
      <button class="btn btn-primary" onclick="go('studySelect')">顺序刷题</button>
      <button class="btn" onclick="go('exam')">模拟考试</button>
      <button class="btn btn-danger" onclick="go('wrongbook')">错题本 <span style="background:#fff;color:#f56c6c;border-radius:10px;padding:2px 8px;font-size:12px">${wrongBook.length}</span></button>
    </div>
  `;
}

// 顺序刷题-选题型
function renderStudySelect() {
  setHeader('选择题型', true);
  $('app').innerHTML = `
    <div class="page">
      <button class="btn" onclick="startStudy('all')">全部题型 (333题)</button>
      <button class="btn" onclick="startStudy('single')">单选题 (186题)</button>
      <button class="btn" onclick="startStudy('multi')">多选题 (67题)</button>
      <button class="btn" onclick="startStudy('judge')">判断题 (80题)</button>
    </div>
  `;
}

function startStudy(type) {
  let qs = [];
  if (type === 'all') {
    qs = [
      ...allQuestions['单选题'].map(q => ({...q, type: '单选'})),
      ...allQuestions['多选题'].map(q => ({...q, type: '多选'})),
      ...allQuestions['判断题'].map(q => ({...q, type: '判断'}))
    ];
  } else if (type === 'single') {
    qs = allQuestions['单选题'].map(q => ({...q, type: '单选'}));
  } else if (type === 'multi') {
    qs = allQuestions['多选题'].map(q => ({...q, type: '多选'}));
  } else {
    qs = allQuestions['判断题'].map(q => ({...q, type: '判断'}));
  }
  studyState = { type, questions: qs, index: 0, answered: false, selectedOptions: [] };
  go('study');
}

// 顺序刷题页面
function renderStudy() {
  const { questions, index, answered, selectedOptions } = studyState;
  if (index >= questions.length) {
    setHeader('刷题完成', true);
    $('app').innerHTML = `
      <div class="page">
        <div class="empty-state">
          <div class="icon">🎉</div>
          <div>恭喜你已完成所有题目！</div>
        </div>
        <button class="btn btn-primary" onclick="studyState.index=0;studyState.answered=false;studyState.selectedOptions=[];render();">重新开始</button>
        <button class="btn" onclick="goBack();goBack();">返回首页</button>
      </div>
    `;
    return;
  }
  const q = questions[index];
  setHeader('顺序刷题', true);
  const total = questions.length;
  const progress = ((index) / total * 100).toFixed(0);

  let html = `<div class="page">
    <div class="question-nav">
      <div class="info">${index + 1} / ${total}</div>
      <div class="progress-bar" style="flex:1;margin:0 10px"><div class="progress-fill" style="width:${progress}%"></div></div>
    </div>`;

  if (q.type === '单选') {
    html += renderSingleChoice(q, answered, selectedOptions[0]);
  } else if (q.type === '多选') {
    html += renderMultiChoice(q, answered, selectedOptions);
  } else {
    html += renderJudge(q, answered, selectedOptions[0]);
  }

  html += `<div class="action-row">`;
  if (index > 0) {
    html += `<button class="nav-btn" onclick="prevQuestion()">上一题</button>`;
  }
  if (index < total - 1) {
    html += `<button class="nav-btn" onclick="nextQuestion()">下一题</button>`;
  } else {
    html += `<button class="nav-btn" onclick="goBack();goBack();render();">完成</button>`;
  }
  html += `</div></div>`;
  $('app').innerHTML = html;
}

function renderSingleChoice(q, answered, selected) {
  const options = ['A','B','C','D'];
  let html = `<div class="card">
    <div class="question-meta">${q.type === '单选' ? '单选题' : '多选题'}</div>
    <div class="question-text">${q.question}</div>`;
  if (q.type === '单选') {
    for (const k of options) {
      if (!q.options[k]) continue;
      let cls = 'option-item';
      if (answered) {
        cls += ' disabled';
        if (k === q.answer) cls += ' correct';
        else if (k === selected) cls += ' wrong';
      } else if (k === selected) {
        cls += ' selected';
      }
      html += `<div class="${cls}" onclick="${answered ? '' : `selectOption('${k}')`}">
        <span class="option-label">${k}</span>
        <span class="option-text">${q.options[k]}</span>
      </div>`;
    }
  }
  html += renderFeedback(q, answered, selected ? [selected] : []);
  html += `</div>`;
  return html;
}

function renderMultiChoice(q, answered, selected) {
  const options = ['A','B','C','D','E','F'];
  let html = `<div class="card">
    <div class="question-meta">多选题</div>
    <div class="multi-hint">* 此题为多选题，至少选择一项</div>
    <div class="question-text">${q.question}</div>`;
  for (const k of options) {
    if (!q.options[k]) continue;
    let cls = 'option-item';
    const isSelected = selected && selected.includes(k);
    if (answered) {
      cls += ' disabled';
      const isCorrect = q.answer.includes(k);
      if (isCorrect && isSelected) cls += ' correct';
      else if (isSelected && !isCorrect) cls += ' wrong';
      else if (isCorrect && !isSelected) cls += ' correct';
    } else if (isSelected) {
      cls += ' selected';
    }
    html += `<div class="${cls}" onclick="${answered ? '' : `toggleMulti('${k}')`}">
      <span class="option-label">${k}</span>
      <span class="option-text">${q.options[k]}</span>
    </div>`;
  }
  html += renderFeedback(q, answered, selected || []);
  if (!answered) {
    html += `<button class="confirm-btn" onclick="confirmMulti()" ${(selected && selected.length > 0) ? '' : 'disabled'}>确认答案</button>`;
  }
  html += `</div>`;
  return html;
}

function renderJudge(q, answered, selected) {
  let html = `<div class="card">
    <div class="question-meta">判断题</div>
    <div class="question-text">${q.question}</div>
    <div class="judge-btns">`;
  for (const v of ['正确', '错误']) {
    let cls = 'judge-btn';
    if (answered) {
      cls += ' disabled';
      if (v === q.answer) cls += ' selected';
      else if (v === selected) cls += ' disabled';
    } else if (v === selected) {
      cls += ' selected';
    }
    html += `<div class="${cls}" onclick="${answered ? '' : `selectJudge('${v}')`}">${v}</div>`;
  }
  html += `</div>`;
  html += renderFeedback(q, answered, selected ? [selected] : []);
  html += `</div>`;
  return html;
}

function renderFeedback(q, answered, selected) {
  if (!answered) return '';
  const correct = Array.isArray(q.answer) ? q.answer : [q.answer];
  const isCorrect = selected.length === correct.length && selected.every(s => correct.includes(s));
  let fb = `<div class="answer-feedback ${isCorrect ? 'answer-correct' : 'answer-wrong'}">`;
  fb += isCorrect ? '✓ 回答正确' : `✗ 回答错误`;
  if (!isCorrect) {
    fb += `<br>正确答案：${correct.join('、')}`;
    // 添加到错题本
    addToWrongBook(q, q.type === '单选' ? '单选题' : q.type === '多选' ? '多选题' : '判断题');
  }
  fb += `</div>`;
  return fb;
}

function selectOption(opt) {
  if (studyState.answered) return;
  studyState.selectedOptions = [opt];
  studyState.answered = true;
  render();
}
function toggleMulti(opt) {
  if (studyState.answered) return;
  if (!studyState.selectedOptions) studyState.selectedOptions = [];
  const idx = studyState.selectedOptions.indexOf(opt);
  if (idx > -1) studyState.selectedOptions.splice(idx, 1);
  else studyState.selectedOptions.push(opt);
  render();
}
function confirmMulti() {
  if (studyState.answered) return;
  if (!studyState.selectedOptions || studyState.selectedOptions.length === 0) return;
  studyState.answered = true;
  render();
}
function selectJudge(val) {
  if (studyState.answered) return;
  studyState.selectedOptions = [val];
  studyState.answered = true;
  const q = studyState.questions[studyState.index];
  const correct = [q.answer];
  if (val !== q.answer) {
    addToWrongBook(q, '判断题');
  }
  render();
}
function nextQuestion() {
  studyState.index++;
  studyState.answered = false;
  studyState.selectedOptions = [];
  render();
}
function prevQuestion() {
  if (studyState.index > 0) {
    studyState.index--;
    studyState.answered = false;
    studyState.selectedOptions = [];
    render();
  }
}

// 模拟考试
function generateExam() {
  const single = shuffle(allQuestions['单选题']).slice(0, 30).map(q => ({...q, type: '单选', score: 2}));
  const multi = shuffle(allQuestions['多选题']).slice(0, 10).map(q => ({...q, type: '多选', score: 2}));
  const judge = shuffle(allQuestions['判断题']).slice(0, 10).map(q => ({...q, type: '判断', score: 2}));
  return [...single, ...multi, ...judge];
}

function renderExam() {
  if (!examState.timer || examState.questions.length === 0) {
    examState = {
      questions: generateExam(),
      answers: {},
      timer: null,
      timeLeft: 3600,
      submitted: false
    };
  }
  renderExamPage();
}

function renderExamPage() {
  const { questions, answers, timeLeft, submitted } = examState;
  const qs = questions;
  const totalScore = qs.reduce((s, q) => s + q.score, 0);

  setHeader('模拟考试', true);

  // 分区显示
  const singleQs = qs.filter(q => q.type === '单选');
  const multiQs = qs.filter(q => q.type === '多选');
  const judgeQs = qs.filter(q => q.type === '判断');

  let html = `<div class="page">
    <div class="timer">
      <div style="display:flex;align-items:center;justify-content:center;gap:12px">
        <span style="background:#07C160;color:#fff;padding:3px 10px;border-radius:10px;font-size:12px">单选${singleQs.length}题</span>
        <span style="background:#e6a23c;color:#fff;padding:3px 10px;border-radius:10px;font-size:12px">多选${multiQs.length}题</span>
        <span style="background:#909399;color:#fff;padding:3px 10px;border-radius:10px;font-size:12px">判断${judgeQs.length}题</span>
      </div>
      <div class="timer-time" id="timerDisplay">${formatTime(timeLeft)}</div>
    </div>`;

  // 单选
  if (singleQs.length > 0) {
    html += `<div class="exam-section">
      <div class="exam-section-title">单选题 (每题2分，共${singleQs.length}题)</div>`;
    for (let i = 0; i < singleQs.length; i++) {
      const q = singleQs[i];
      const qIdx = qs.indexOf(q);
      html += renderExamQuestion(q, qIdx, i + 1, answers[qIdx]);
    }
    html += `</div>`;
  }

  // 多选
  if (multiQs.length > 0) {
    html += `<div class="exam-section">
      <div class="exam-section-title">多选题 (每题2分，共${multiQs.length}题)</div>`;
    for (let i = 0; i < multiQs.length; i++) {
      const q = multiQs[i];
      const qIdx = qs.indexOf(q);
      html += renderExamQuestion(q, qIdx, i + 1, answers[qIdx]);
    }
    html += `</div>`;
  }

  // 判断
  if (judgeQs.length > 0) {
    html += `<div class="exam-section">
      <div class="exam-section-title">判断题 (每题2分，共${judgeQs.length}题)</div>`;
    for (let i = 0; i < judgeQs.length; i++) {
      const q = judgeQs[i];
      const qIdx = qs.indexOf(q);
      html += renderExamQuestion(q, qIdx, i + 1, answers[qIdx]);
    }
    html += `</div>`;
  }

  html += `<button class="confirm-btn" onclick="submitExam()">提交试卷</button></div>`;
  $('app').innerHTML = html;

  if (!examState.timer && !examState.submitted) {
    examState.timer = setInterval(() => {
      examState.timeLeft--;
      const el = $('timerDisplay');
      if (el) el.textContent = formatTime(examState.timeLeft);
      if (examState.timeLeft <= 0) {
        clearInterval(examState.timer);
        examState.timer = null;
        submitExam();
      }
    }, 1000);
  }
}

function renderExamQuestion(q, qIdx, num, answer) {
  let html = `<div class="card" id="q${qIdx}">
    <div class="question-meta">第${num}题 · ${q.type === '单选' ? '单选题' : q.type === '多选' ? '多选题' : '判断题'}</div>
    <div class="question-text">${q.question}</div>`;

  if (q.type === '单选') {
    const opts = ['A','B','C','D'];
    for (const k of opts) {
      if (!q.options[k]) continue;
      const sel = answer === k;
      html += `<div class="option-item ${sel ? 'selected' : ''}" onclick="examSelect(${qIdx},'${k}')">
        <span class="option-label">${k}</span><span class="option-text">${q.options[k]}</span>
      </div>`;
    }
  } else if (q.type === '多选') {
    const opts = ['A','B','C','D','E','F'];
    html += `<div class="multi-hint">* 多选题</div>`;
    const selOpts = answer || [];
    for (const k of opts) {
      if (!q.options[k]) continue;
      const sel = selOpts.includes(k);
      html += `<div class="option-item ${sel ? 'selected' : ''}" onclick="examToggle(${qIdx},'${k}')">
        <span class="option-label">${k}</span><span class="option-text">${q.options[k]}</span>
      </div>`;
    }
  } else {
    html += `<div class="judge-btns">`;
    for (const v of ['正确', '错误']) {
      html += `<div class="judge-btn ${answer === v ? 'selected' : ''}" onclick="examSelect(${qIdx},'${v}')">${v}</div>`;
    }
    html += `</div>`;
  }

  html += `</div>`;
  return html;
}

function examSelect(qIdx, val) {
  if (examState.submitted) return;
  examState.answers[qIdx] = val;
  const card = document.getElementById('q' + qIdx);
  if (!card) return;
  const isJudge = val === '正确' || val === '错误';
  if (isJudge) {
    card.querySelectorAll('.judge-btn').forEach(el => {
      el.classList.toggle('selected', el.textContent.trim() === val);
    });
  } else {
    card.querySelectorAll('.option-item').forEach(el => {
      const label = el.querySelector('.option-label');
      if (label) el.classList.toggle('selected', label.textContent.trim() === val);
    });
  }
}
function examToggle(qIdx, val) {
  if (examState.submitted) return;
  if (!examState.answers[qIdx]) examState.answers[qIdx] = [];
  const arr = examState.answers[qIdx];
  const idx = arr.indexOf(val);
  if (idx > -1) arr.splice(idx, 1);
  else arr.push(val);
  const card = document.getElementById('q' + qIdx);
  if (!card) return;
  card.querySelectorAll('.option-item').forEach(el => {
    const label = el.querySelector('.option-label');
    if (label) el.classList.toggle('selected', arr.includes(label.textContent.trim()));
  });
}

function submitExam() {
  if (examState.timer) {
    clearInterval(examState.timer);
    examState.timer = null;
  }
  examState.submitted = true;
  go('examResult');
}

function renderExamResult() {
  const { questions, answers } = examState;
  let score = 0, total = 0;
  const details = [];

  for (const q of questions) {
    total += q.score;
    const ans = answers[questions.indexOf(q)];
    let isCorrect = false;
    if (q.type === '判断') {
      isCorrect = ans === q.answer;
    } else if (q.type === '单选') {
      isCorrect = ans === q.answer;
    } else {
      const correct = Array.isArray(q.answer) ? q.answer.sort() : [];
      const given = Array.isArray(ans) ? ans.sort() : [];
      isCorrect = correct.length === given.length && correct.every((v, i) => v === given[i]);
    }
    if (isCorrect) score += q.score;
    else {
      // 错题加入错题本
      addToWrongBook(q, q.type === '单选' ? '单选题' : q.type === '多选' ? '多选题' : '判断题');
    }
    details.push({ q, ans, isCorrect });
  }

  const pct = Math.round(score / total * 100);
  let grade = '不及格';
  if (pct >= 90) grade = '优秀';
  else if (pct >= 80) grade = '良好';
  else if (pct >= 60) grade = '及格';

  setHeader('考试成绩', true);

  let html = `<div class="page">
    <div class="result-card">
      <div class="result-score">${pct}</div>
      <div class="result-desc">总分 100 分 · 您的得分</div>
      <div style="margin-top:10px">
        <span style="background:#07C160;color:#fff;padding:4px 12px;border-radius:12px;font-size:13px">${grade}</span>
        <span style="margin-left:10px;color:#999;font-size:14px">${score} / ${total} 分</span>
      </div>
    </div>
    <div class="card">
      <div class="card-title">答题详情</div>
      <div class="result-detail">`;
  for (let i = 0; i < details.length; i++) {
    const { q, ans, isCorrect } = details[i];
    const qType = q.type === '单选' ? '单选' : q.type === '多选' ? '多选' : '判断';
    html += `<div class="result-item">
      <span style="color:${isCorrect ? '#07C160' : '#f56c6c'}">${isCorrect ? '✓' : '✗'}</span>
      第${i + 1}题 ${qType} · ${q.score}分
      <div style="color:#666;font-size:13px;margin-top:4px">${q.question}</div>`;
    if (!isCorrect) {
      const correctAns = Array.isArray(q.answer) ? q.answer.join('、') : q.answer;
      html += `<div style="color:#f56c6c;font-size:13px">您的答案：${Array.isArray(ans) ? ans.join('、') : (ans || '未答')}</div>`;
      html += `<div style="color:#07C160;font-size:13px">正确答案：${correctAns}</div>`;
    }
    html += `</div>`;
  }
  html += `</div></div>
    <button class="btn btn-primary" onclick="examState={questions:[],answers:{},timer:null,timeLeft:3600,submitted:false};go('exam');">重新考试</button>
    <button class="btn" onclick="go('home');pageStack=[];">返回首页</button>
  </div>`;
  $('app').innerHTML = html;
}

// 错题本
function renderWrongbook() {
  setHeader('错题本', true);
  if (wrongBook.length === 0) {
    $('app').innerHTML = `<div class="page">
      <div class="empty-state">
        <div class="icon">📚</div>
        <div>暂无错题记录</div>
        <div style="margin-top:10px;font-size:13px;color:#999">答错的题目会自动收录到这里</div>
      </div>
      <button class="btn" onclick="goBack()">返回首页</button>
    </div>`;
    return;
  }
  $('app').innerHTML = `<div class="page">
    <div class="card">
      <div class="card-title">错题统计</div>
      <div class="card-desc">共 ${wrongBook.length} 道错题</div>
    </div>
    <button class="btn btn-danger" style="margin-bottom:15px" onclick="confirmClear()">清空错题本</button>
    <button class="btn btn-primary" onclick="startReview()">重新练习错题</button>
    <div style="margin-top:15px">${wrongBook.map((w, i) => `
      <div class="wrong-card">
        <div class="wrong-num">错题 ${i + 1} · ${w.type}</div>
        <div class="wrong-q">${w.question.question}</div>
        <div class="wrong-answer">正确答案：${Array.isArray(w.question.answer) ? w.question.answer.join('、') : w.question.answer}</div>
      </div>
    `).join('')}</div>
  </div>`;
}

function confirmClear() {
  if (confirm('确定要清空所有错题记录吗？')) {
    wrongBook = [];
    saveWrongBook();
    render();
  }
}

function startReview() {
  reviewState = {
    questions: wrongBook.map(w => ({...w.question, type: w.type === '单选题' ? '单选' : w.type === '多选题' ? '多选' : '判断'})),
    index: 0,
    answered: false,
    selectedOptions: []
  };
  go('review');
}

function renderReview() {
  const { questions, index, answered, selectedOptions } = reviewState;
  if (index >= questions.length) {
    setHeader('练习完成', true);
    $('app').innerHTML = `<div class="page">
      <div class="empty-state">
        <div class="icon">🎉</div>
        <div>恭喜你完成错题复习！</div>
      </div>
      <button class="btn btn-primary" onclick="reviewState.index=0;reviewState.answered=false;reviewState.selectedOptions=[];render();">重新练习</button>
      <button class="btn" onclick="go('wrongbook')">返回错题本</button>
    </div>`;
    return;
  }
  const q = questions[index];
  const total = questions.length;
  setHeader(`错题复习 ${index + 1}/${total}`, true);

  let html = `<div class="page">
    <div class="question-nav">
      <div class="info">${index + 1} / ${total}</div>
      <div class="progress-bar" style="flex:1;margin:0 10px"><div class="progress-fill" style="width:${(index/total*100).toFixed(0)}%"></div></div>
    </div>`;

  if (q.type === '单选') {
    html += renderSingleChoice(q, answered, selectedOptions[0]);
  } else if (q.type === '多选') {
    html += renderMultiChoice(q, answered, selectedOptions);
  } else {
    html += renderJudge(q, answered, selectedOptions[0]);
  }

  html += `<div class="action-row">`;
  if (index > 0) {
    html += `<button class="nav-btn" onclick="reviewPrev()">上一题</button>`;
  }
  if (index < total - 1) {
    html += `<button class="nav-btn" onclick="reviewNext()">下一题</button>`;
  } else {
    html += `<button class="nav-btn" onclick="go('wrongbook')">完成</button>`;
  }
  html += `</div></div>`;
  $('app').innerHTML = html;
}

function reviewSelect(opt) {
  if (reviewState.answered) return;
  reviewState.selectedOptions = [opt];
  reviewState.answered = true;
  render();
}
function reviewToggle(opt) {
  if (reviewState.answered) return;
  if (!reviewState.selectedOptions) reviewState.selectedOptions = [];
  const idx = reviewState.selectedOptions.indexOf(opt);
  if (idx > -1) reviewState.selectedOptions.splice(idx, 1);
  else reviewState.selectedOptions.push(opt);
  render();
}
function reviewConfirmMulti() {
  if (reviewState.answered) return;
  if (!reviewState.selectedOptions || reviewState.selectedOptions.length === 0) return;
  reviewState.answered = true;
  render();
}
function reviewSelectJudge(val) {
  if (reviewState.answered) return;
  reviewState.selectedOptions = [val];
  reviewState.answered = true;
  const q = reviewState.questions[reviewState.index];
  if (val !== q.answer) {
    // 错题本中的题再次做错，保留
  } else {
    // 做对了，从错题本移除
    const key = (q.type === '单选' ? '单选题' : q.type === '多选' ? '多选题' : '判断题') + '_' + q.id;
    const idx = wrongBook.findIndex(w => w.key === key);
    if (idx > -1) {
      wrongBook.splice(idx, 1);
      saveWrongBook();
      reviewState.questions.splice(reviewState.index, 1);
      if (reviewState.index >= reviewState.questions.length) {
        reviewState.index = Math.max(0, reviewState.questions.length - 1);
      }
    }
  }
  render();
}
function reviewNext() {
  reviewState.index++;
  reviewState.answered = false;
  reviewState.selectedOptions = [];
  render();
}
function reviewPrev() {
  if (reviewState.index > 0) {
    reviewState.index--;
    reviewState.answered = false;
    reviewState.selectedOptions = [];
    render();
  }
}

// 初始化
render();
</script>
